<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G04 — All Tenses · Polytech Lille</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0d1b2a; --gold:#C9A020; --gold-l:#e8b84b; --cream:#FAF6ED;
  --blue:#3a86ff; --blue-l:#a8c8ff;
  --teal:#06d6a0; --teal-l:#a8f0de;
  --red:#ef476f;  --red-l:#ffb3c6;
  --amber:#ffd166;
  --coral:#ff6b6b; --coral-l:#ffb3b3;
  --purple:#9b5de5; --purp-l:#d4a8ff;
  --green:#2ecc71; --green-l:#a8f0c0;
  --t:.32s cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'Source Serif 4',serif;background:var(--navy);color:var(--cream)}

/* orbs */
.orb{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0;animation:drift 22s ease-in-out infinite alternate}
.orb1{width:700px;height:700px;background:rgba(155,93,229,.07);top:-250px;left:-200px}
.orb2{width:500px;height:500px;background:rgba(6,214,160,.06);bottom:-180px;right:-120px;animation-delay:-9s}
.orb3{width:400px;height:400px;background:rgba(201,160,32,.05);top:25%;left:40%;animation-delay:-17s}
@keyframes drift{from{transform:translate(0,0)}to{transform:translate(55px,38px)}}

#app{width:100vw;height:100vh;display:flex;flex-direction:column;position:relative;z-index:1}

/* TOP BAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:.65rem 2.8rem;background:rgba(13,27,42,.92);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0;z-index:20}
.brand{font-family:'JetBrains Mono',monospace;font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold)}
.pill{font-family:'JetBrains Mono',monospace;font-size:.72rem;letter-spacing:.1em;padding:.3rem .9rem;border-radius:20px;background:rgba(201,160,32,.18);color:var(--gold-l);border:1px solid rgba(201,160,32,.3)}
.sc{font-family:'JetBrains Mono',monospace;font-size:.75rem;letter-spacing:.1em;color:rgba(250,246,237,.3)}

/* SLIDE AREA */
.sa{flex:1;position:relative;overflow:hidden}
.slide{position:absolute;inset:0;display:flex;flex-direction:column;padding:2rem 3.8rem 1.2rem;overflow-y:auto;opacity:0;transform:translateX(70px);transition:opacity .36s var(--t),transform .36s var(--t);pointer-events:none}
.slide.active{opacity:1;transform:translateX(0);pointer-events:all}
.slide.out{opacity:0;transform:translateX(-70px)}

/* BOTTOM NAV */
.bnav{display:flex;align-items:center;justify-content:center;gap:1rem;padding:.9rem 2rem;background:rgba(13,27,42,.92);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,.07);flex-shrink:0;z-index:20}
.nb{font-family:'JetBrains Mono',monospace;font-size:.85rem;letter-spacing:.06em;padding:.55rem 2rem;border-radius:30px;border:1px solid rgba(255,255,255,.18);background:transparent;color:var(--cream);cursor:pointer;transition:var(--t)}
.nb:hover{background:rgba(255,255,255,.09)}
.nb.prim{background:var(--gold);border-color:var(--gold);color:var(--navy);font-weight:700}
.nb.prim:hover{background:var(--gold-l)}
.dots{display:flex;gap:.45rem;align-items:center;flex-wrap:wrap;justify-content:center;max-width:400px}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.18);cursor:pointer;transition:var(--t);flex-shrink:0}
.dot.on{background:var(--gold);transform:scale(1.4)}

/* TYPOGRAPHY */
.stag{font-family:'JetBrains Mono',monospace;font-size:.75rem;letter-spacing:.2em;text-transform:uppercase;margin-bottom:.55rem;animation:fuA .5s both}
.stitle{font-family:'Playfair Display',serif;font-size:clamp(1.9rem,3.6vw,2.9rem);font-weight:900;line-height:1.1;margin-bottom:.8rem;animation:fuA .5s .07s both}
.slead{font-size:1.02rem;color:rgba(250,246,237,.68);line-height:1.65;margin-bottom:.9rem;max-width:82ch;animation:fuA .5s .12s both}
@keyframes fuA{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}

/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.8rem}
.card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:1rem 1.2rem;animation:fuA .5s both}
.card:nth-child(1){animation-delay:.04s}.card:nth-child(2){animation-delay:.1s}
.card:nth-child(3){animation-delay:.16s}.card:nth-child(4){animation-delay:.22s}
.clabel{font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;opacity:.5;margin-bottom:.4rem}

/* BANDS */
.band{border-radius:12px;padding:.85rem 1.3rem;font-size:.95rem;line-height:1.6;margin-bottom:.75rem;animation:fuA .5s .2s both}
.band.g{background:rgba(201,160,32,.1);border:1px solid rgba(201,160,32,.22)}
.band.r{background:rgba(239,71,111,.1);border:1px solid rgba(239,71,111,.22)}
.band.t{background:rgba(6,214,160,.1);border:1px solid rgba(6,214,160,.22)}
.band.p{background:rgba(155,93,229,.1);border:1px solid rgba(155,93,229,.22)}

/* EXAMPLES */
.exlist{display:flex;flex-direction:column;gap:.5rem}
.ex{border-radius:9px;padding:.65rem 1rem;border-left:3px solid;animation:fuA .4s both}
.ex:nth-child(1){animation-delay:.08s}.ex:nth-child(2){animation-delay:.15s}
.ex:nth-child(3){animation-delay:.22s}.ex:nth-child(4){animation-delay:.29s}
.en{font-size:1rem;font-weight:600;color:var(--cream);margin-bottom:.15rem}
.fr{font-size:.85rem;color:rgba(250,246,237,.4);font-style:italic}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:.45rem;margin:.4rem 0}
.chip{font-family:'JetBrains Mono',monospace;font-size:.82rem;font-weight:700;padding:.32rem .85rem;border-radius:22px;animation:pop .4s both}
.chip:nth-child(1){animation-delay:.04s}.chip:nth-child(2){animation-delay:.09s}
.chip:nth-child(3){animation-delay:.14s}.chip:nth-child(4){animation-delay:.19s}
.chip:nth-child(5){animation-delay:.24s}.chip:nth-child(6){animation-delay:.29s}
.chip:nth-child(7){animation-delay:.34s}

/* TABLE */
.tbl{width:100%;border-collapse:separate;border-spacing:0 4px}
.tbl th{font-family:'JetBrains Mono',monospace;font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;padding:.38rem .8rem;text-align:left;color:rgba(250,246,237,.35)}
.tbl td{padding:.58rem .8rem;font-size:.88rem;background:rgba(255,255,255,.04)}
.tbl tr td:first-child{border-radius:8px 0 0 8px;font-family:'JetBrains Mono',monospace;font-size:.78rem;font-weight:700}
.tbl tr td:last-child{border-radius:0 8px 8px 0;font-size:.82rem;font-style:italic;color:rgba(250,246,237,.42)}
.tbl tr:hover td{background:rgba(255,255,255,.07)}

.mt{margin-top:.65rem}
.mb{margin-bottom:.65rem}

/* ═══════════════════════════════════════════════
   ANIMATED DEMO BLOCK — the heart of the pedagogy
═══════════════════════════════════════════════ */
.demo-box{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.09);
  border-radius:18px;
  padding:1.6rem 2rem;
  margin:.6rem 0;
  min-height:8rem;
  display:flex;flex-direction:column;gap:.9rem;
  position:relative;
  overflow:hidden;
}
/* the example sentence */
.demo-sentence{
  font-family:'Source Serif 4',serif;
  font-size:1.8rem;
  font-weight:600;
  color:var(--cream);
  line-height:1.4;
  display:flex;flex-wrap:wrap;align-items:baseline;gap:.3rem;
}
.demo-sentence .w{display:inline-block;transition:all .3s ease}

/* Signal word — shakes then glows */
.sig{
  display:inline-block;
  color:var(--amber);
  font-style:italic;
  position:relative;
}
.sig.shake{animation:shake .55s cubic-bezier(.36,.07,.19,.97)}
@keyframes shake{
  10%,90%{transform:translate(-2px,0) rotate(-1deg)}
  20%,80%{transform:translate(3px,0) rotate(1deg)}
  30%,50%,70%{transform:translate(-4px,0) rotate(-1deg)}
  40%,60%{transform:translate(4px,0) rotate(1deg)}
  100%{transform:translate(0,0) rotate(0deg)}
}
.sig.glow{
  text-shadow:0 0 18px rgba(255,209,102,.9),0 0 40px rgba(255,209,102,.5);
  color:var(--amber);
}

/* Tense label that appears */
.demo-tense-label{
  font-family:'JetBrains Mono',monospace;
  font-size:.75rem;letter-spacing:.18em;text-transform:uppercase;
  padding:.28rem .85rem;border-radius:20px;
  opacity:0;transform:translateY(8px);
  transition:opacity .4s .1s,transform .4s .1s;
  display:inline-block;align-self:flex-start;
}
.demo-tense-label.show{opacity:1;transform:translateY(0)}

/* Verb + suffix animation */
.demo-verb-wrap{
  display:flex;align-items:baseline;gap:0;
  font-family:'JetBrains Mono',monospace;
  font-size:2.4rem;font-weight:700;
}
.verb-stem{color:var(--cream);display:inline-block}
.verb-suffix{
  display:inline-block;
  opacity:0;transform:scale(.4) translateX(-10px);
  transition:opacity .45s .05s cubic-bezier(.34,1.56,.64,1),
             transform .45s .05s cubic-bezier(.34,1.56,.64,1);
}
.verb-suffix.boom{opacity:1;transform:scale(1) translateX(0)}
/* irregular — whole word swaps */
.verb-irreg{
  display:inline-block;
  opacity:0;transform:translateY(20px) scale(.8);
  transition:opacity .45s .05s cubic-bezier(.34,1.56,.64,1),
             transform .45s .05s cubic-bezier(.34,1.56,.64,1);
}
.verb-irreg.boom{opacity:1;transform:translateY(0) scale(1)}

/* Step indicators */
.steps{display:flex;gap:.6rem;margin-top:.3rem}
.step{
  width:8px;height:8px;border-radius:50%;
  background:rgba(255,255,255,.15);
  transition:.3s;cursor:pointer;
}
.step.done{background:var(--gold)}
.step.active{background:var(--gold);transform:scale(1.4)}

/* Annotation arrow */
.anno{
  font-family:'JetBrains Mono',monospace;
  font-size:.78rem;color:rgba(250,246,237,.5);
  opacity:0;transition:opacity .4s .2s;
  display:flex;align-items:center;gap:.4rem;
}
.anno.show{opacity:1}
.anno-arrow{color:var(--gold);font-size:1rem}

/* Play button */
.play-btn{
  font-family:'JetBrains Mono',monospace;font-size:.78rem;letter-spacing:.08em;
  padding:.42rem 1.2rem;border-radius:22px;
  border:1px solid var(--gold);background:transparent;color:var(--gold);
  cursor:pointer;transition:var(--t);align-self:flex-start;
}
.play-btn:hover{background:rgba(201,160,32,.14)}
.play-btn.busy{opacity:.3;pointer-events:none}

/* Decision tree */
.dtree{display:flex;flex-direction:column;gap:.5rem;animation:fuA .5s .1s both}
.dt-row{
  display:flex;align-items:flex-start;gap:.8rem;
  padding:.7rem 1rem;border-radius:10px;
  background:rgba(255,255,255,.04);border-left:3px solid rgba(255,255,255,.15);
  font-size:.92rem;line-height:1.55;
}
.dt-num{
  font-family:'JetBrains Mono',monospace;font-size:1.1rem;font-weight:700;
  color:var(--gold);min-width:1.5rem;flex-shrink:0;
}

/* Tense color map */
.c-ps{color:var(--coral-l)}.c-pc{color:var(--blue-l)}.c-pr{color:var(--teal-l)}
.c-pp{color:var(--teal-l)}.c-past-p{color:var(--purp-l)}.c-fut{color:var(--amber)}
.c-gto{color:var(--green-l)}.c-fc{color:var(--amber)}.c-fp{color:var(--gold-l)}
.c-ppc{color:var(--purp-l)}
.bg-ps{background:rgba(255,107,107,.09);border-color:var(--coral)}
.bg-pc{background:rgba(58,134,255,.09);border-color:var(--blue)}
.bg-pr{background:rgba(6,214,160,.09);border-color:var(--teal)}
.bg-pp{background:rgba(6,214,160,.09);border-color:var(--teal)}
.bg-past-p{background:rgba(155,93,229,.09);border-color:var(--purple)}
.bg-fut{background:rgba(255,209,102,.09);border-color:var(--amber)}
.bg-gto{background:rgba(46,204,113,.09);border-color:var(--green)}
</style>
</head>
<body>
<div id="app">
  <div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div>

  <div class="topbar">
    <div class="brand">Marc Vasseur · Polytech Lille · Anglais</div>
    <div class="pill">G04 · PEIP2 Remédiation · B1–B2 · All Tenses</div>
    <div class="sc" id="sc">1 / 14</div>
  </div>

  <div class="sa" id="sa"></div>

  <div class="bnav">
    <button class="nb" onclick="go(-1)">◀ Précédent</button>
    <div class="dots" id="dots"></div>
    <button class="nb prim" onclick="go(1)">Suivant ▶</button>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════
   ANIMATED DEMO ENGINE
   Each demo-block has a sequence of "steps" triggered
   by calling nextStep(id). The ▶ button on each slide
   advances one step at a time.
═══════════════════════════════════════════════════════ */

// Registry: demoId → {steps[], currentStep}
const DEMOS = {};

function registerDemo(id, steps) {
  DEMOS[id] = { steps, cur: -1 };
}

function runDemo(id) {
  if (!DEMOS[id]) return;
  const d = DEMOS[id];
  d.cur++;
  if (d.cur >= d.steps.length) {
    // restart
    resetDemo(id);
    d.cur = 0;
  }
  d.steps[d.cur]();
  // update step dots
  document.querySelectorAll(`#demo-steps-${id} .step`).forEach((s, i) => {
    s.classList.toggle('done', i < d.cur);
    s.classList.toggle('active', i === d.cur);
  });
  // button label
  const btn = document.getElementById(`demo-btn-${id}`);
  if (btn) {
    if (d.cur >= d.steps.length - 1) btn.textContent = '↺ Recommencer';
    else btn.textContent = '▶ Étape suivante';
  }
}

function resetDemo(id) {
  if (!DEMOS[id]) return;
  DEMOS[id].cur = -1;
  // reset visual state — remove animation classes
  document.querySelectorAll(`[data-demo="${id}"]`).forEach(el => {
    el.classList.remove('shake','glow','show','boom');
  });
  document.querySelectorAll(`#demo-steps-${id} .step`).forEach(s => {
    s.classList.remove('done','active');
  });
  const btn = document.getElementById(`demo-btn-${id}`);
  if (btn) btn.textContent = '▶ Démarrer';
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

/* helper: shake then glow a signal word */
async function animateSig(sel) {
  const el = document.querySelector(sel);
  if (!el) return;
  el.classList.add('shake');
  await delay(580);
  el.classList.remove('shake');
  el.classList.add('glow');
}

/* helper: show tense label */
function showLabel(sel) {
  const el = document.querySelector(sel);
  if (el) el.classList.add('show');
}

/* helper: boom suffix/irregular */
function boom(sel) {
  const el = document.querySelector(sel);
  if (el) el.classList.add('boom');
}

/* helper: show annotation */
function showAnno(sel) {
  const el = document.querySelector(sel);
  if (el) el.classList.add('show');
}

/* ═══════════════════════════════════════════════
   SLIDES DATA
═══════════════════════════════════════════════ */
const SLIDES = [

/* ── 0 TITRE ── */
{ html: `
<div style="display:flex;flex-direction:column;justify-content:center;height:100%;gap:1.6rem">
  <div class="stag" style="color:var(--gold)">G04 · All Tenses — Complete Review</div>
  <div class="stitle" style="font-size:clamp(2.4rem,5vw,4rem)">
    Tous les temps<br><span style="color:var(--gold)">anglais</span>
  </div>
  <div class="slead" style="font-size:1.1rem">
    11 temps · une logique · une règle d'or :<br>
    <strong style="color:var(--cream)">Lis les marqueurs temporels EN PREMIER.</strong><br>
    Ils indiquent presque toujours le bon temps.
  </div>
  <div class="band g" style="font-size:1rem;animation-delay:.3s">
    🧠 La clé : chaque temps a ses <strong style="color:var(--amber)">marqueurs signal</strong> — apprends-les et tu choisis le bon temps automatiquement.
  </div>
  <div class="chips">
    <span class="chip" style="background:rgba(255,107,107,.2);color:var(--coral-l);border:1px solid rgba(255,107,107,.32)">PASSÉ · 4 temps</span>
    <span class="chip" style="background:rgba(6,214,160,.2);color:var(--teal-l);border:1px solid rgba(6,214,160,.32)">PRÉSENT · 3 temps</span>
    <span class="chip" style="background:rgba(255,209,102,.2);color:var(--amber);border:1px solid rgba(255,209,102,.32)">FUTUR · 4 temps</span>
  </div>
</div>` },

/* ── 1 PAST SIMPLE — animation yesterday → ed / irrégulier ── */
{ id: 'ps', html: `
<div class="stag" style="color:var(--coral-l)">Passé · Past Simple</div>
<div class="stitle">Action <span style="color:var(--coral)">terminée</span>, moment précis</div>
<div class="g2" style="margin-bottom:.7rem">
  <div>
    <div class="band" style="background:rgba(255,107,107,.09);border:1px solid rgba(255,107,107,.22);font-size:.92rem;margin-bottom:.6rem">
      <strong style="color:var(--coral-l)">Marqueurs :</strong><br>
      <span style="color:var(--amber)">yesterday · ago · last year · in 2020 · at 5 PM</span>
    </div>
    <div class="exlist">
      <div class="ex" style="background:rgba(255,107,107,.09);border-color:var(--coral)">
        <div class="en">She <strong style="color:var(--coral-l)">left</strong> the office <em style="color:var(--amber)">yesterday</em>.</div>
        <div class="fr">Elle a quitté le bureau hier.</div>
      </div>
      <div class="ex" style="background:rgba(255,107,107,.09);border-color:var(--coral)">
        <div class="en">He <strong style="color:var(--coral-l)">worked</strong> late <em style="color:var(--amber)">last night</em>.</div>
        <div class="fr">Il a travaillé tard hier soir.</div>
      </div>
    </div>
  </div>
  <div>
    <!-- ANIMATED DEMO -->
    <div class="demo-box" id="demo-ps">
      <div style="font-family:'JetBrains Mono',monospace;font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;color:rgba(250,246,237,.3);margin-bottom:.2rem">Démonstration</div>

      <div class="demo-sentence">
        <span class="w">She</span>
        <span class="w">___</span>
        <span class="w">the report</span>
        <span class="w sig" id="ps-sig" data-demo="ps"><em>yesterday</em></span><span class="w">.</span>
      </div>

      <div class="demo-tense-label" id="ps-label" data-demo="ps"
        style="background:rgba(255,107,107,.2);color:var(--coral-l);border:1px solid rgba(255,107,107,.35)">
        → Past Simple
      </div>

      <div style="display:flex;flex-direction:column;gap:.5rem">
        <div style="font-size:.85rem;color:rgba(250,246,237,.4)">Verbe régulier :</div>
        <div class="demo-verb-wrap">
          <span class="verb-stem">finish</span><span class="verb-suffix c-ps" id="ps-ed" data-demo="ps">ed</span>
        </div>
        <div class="anno" id="ps-anno1" data-demo="ps">
          <span class="anno-arrow">↑</span> finish + ed → <strong style="color:var(--coral-l)">finished</strong>
        </div>
        <div style="font-size:.85rem;color:rgba(250,246,237,.4);margin-top:.3rem">Verbe irrégulier :</div>
        <div class="demo-verb-wrap">
          <span class="verb-stem" style="opacity:.35">go</span>
          <span style="color:rgba(250,246,237,.2);margin:0 .5rem">→</span>
          <span class="verb-irreg c-ps" id="ps-irreg" data-demo="ps">went</span>
        </div>
        <div class="anno" id="ps-anno2" data-demo="ps">
          <span class="anno-arrow">↑</span> go → <strong style="color:var(--coral-l)">went</strong> (forme 2, à apprendre !)
        </div>
      </div>

      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:.5rem">
        <div class="steps" id="demo-steps-ps">
          <div class="step"></div><div class="step"></div><div class="step"></div><div class="step"></div>
        </div>
        <button class="play-btn" id="demo-btn-ps" onclick="runDemo('ps')">▶ Démarrer</button>
      </div>
    </div>
  </div>
</div>

<div class="band r" style="font-size:.9rem">
  ⚠ Négatif : <strong style="color:var(--red-l)">didn't + base</strong> · Interrogatif : <strong style="color:var(--red-l)">Did + sujet + base ?</strong> — jamais de -ed après didn't / did !
</div>
`,
  onEnter: () => {
    registerDemo('ps', [
      // step 0 : signal word shakes
      async () => { await animateSig('#ps-sig'); },
      // step 1 : tense label appears
      () => { showLabel('#ps-label'); },
      // step 2 : -ed suffix booms
      () => { boom('#ps-ed'); showAnno('#ps-anno1'); },
      // step 3 : irregular booms
      () => { boom('#ps-irreg'); showAnno('#ps-anno2'); },
    ]);
  }
},

/* ── 2 PAST CONTINUOUS — animation while/when + was/were + ing ── */
{ id: 'pc', html: `
<div class="stag" style="color:var(--blue-l)">Passé · Past Continuous</div>

/* ═══════════════════════════════════════════
   ENGINE
═══════════════════════════════════════════ */
let cur = 0;

function build() {
  const sa = document.getElementById('sa');
  sa.innerHTML = '';
  SLIDES.forEach((s, i) => {
    const d = document.createElement('div');
    d.className = 'slide' + (i === 0 ? ' active' : '');
    d.id = 'sl' + i;
    d.innerHTML = s.html;
    sa.appendChild(d);
  });
  buildDots();
  updateUI();
  if (SLIDES[0].onEnter) SLIDES[0].onEnter();
}

function buildDots() {
  const nd = document.getElementById('dots');
  nd.innerHTML = '';
  SLIDES.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' on' : '');
    d.onclick = () => goTo(i);
    nd.appendChild(d);
  });
}

function goTo(idx) {
  if (idx < 0 || idx >= SLIDES.length) return;
  const all = document.querySelectorAll('.slide');
  all[cur].classList.remove('active');
  all[cur].classList.add('out');
  const prev = cur;
  setTimeout(() => { all[prev].classList.remove('out'); }, 380);
  cur = idx;
  all[cur].classList.add('active');
  updateUI();
  // trigger onEnter after transition
  setTimeout(() => {
    if (SLIDES[cur].onEnter) SLIDES[cur].onEnter();
  }, 100);
}

function updateUI() {
  document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('on', i === cur));
  document.getElementById('sc').textContent = (cur + 1) + ' / ' + SLIDES.length;
}

function go(d) { goTo(cur + d); }

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') go(1);
  if (e.key === 'ArrowLeft') go(-1);
});

build();
</script>
