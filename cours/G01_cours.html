<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Les deux présents anglais · Polytech Lille</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy:  #0d1b2a;
  --gold:  #C9A020;
  --gold-l:#e8b84b;
  --cream: #FAF6ED;
  --blue:  #3a86ff;
  --blue-l:#a8c8ff;
  --teal:  #06d6a0;
  --teal-l:#a8f0de;
  --red:   #ef476f;
  --red-l: #ffb3c6;
  --amber: #ffd166;
  --purple:#9b5de5;
  --t: .35s cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  height:100%;overflow:hidden;
  font-family:'Source Serif 4',Georgia,serif;
  background:var(--navy);color:var(--cream);
}
.orb{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0;animation:drift 20s ease-in-out infinite alternate}
.orb1{width:600px;height:600px;background:rgba(58,134,255,.09);top:-200px;left:-150px}
.orb2{width:500px;height:500px;background:rgba(6,214,160,.07);bottom:-150px;right:-100px;animation-delay:-8s}
.orb3{width:350px;height:350px;background:rgba(201,160,32,.06);top:35%;left:45%;animation-delay:-15s}
@keyframes drift{from{transform:translate(0,0)}to{transform:translate(50px,35px)}}

#app{width:100vw;height:100vh;display:flex;flex-direction:column;position:relative;z-index:1}

/* TOP BAR */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:.65rem 2.8rem;
  background:rgba(13,27,42,.92);backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,.07);
  flex-shrink:0;z-index:20;
}
.brand{font-family:'JetBrains Mono',monospace;font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold)}
.tab-nav{display:flex;gap:.5rem}
.tab-btn{
  font-family:'JetBrains Mono',monospace;font-size:.78rem;letter-spacing:.06em;
  padding:.38rem 1.15rem;border-radius:24px;border:1px solid rgba(255,255,255,.14);
  background:transparent;color:rgba(250,246,237,.5);cursor:pointer;transition:var(--t);
}
.tab-btn:hover{background:rgba(255,255,255,.08);color:var(--cream)}
.tab-btn.on-b{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:700}
.tab-btn.on-t{background:var(--teal);border-color:var(--teal);color:var(--navy);font-weight:700}
.sc{font-family:'JetBrains Mono',monospace;font-size:.75rem;letter-spacing:.1em;color:rgba(250,246,237,.3)}

/* SLIDE AREA */
.sa{flex:1;position:relative;overflow:hidden}
.slide{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  padding:2.2rem 3.8rem 1.4rem;
  overflow-y:auto;
  opacity:0;transform:translateX(70px);
  transition:opacity .36s var(--t),transform .36s var(--t);
  pointer-events:none;
}
.slide.active{opacity:1;transform:translateX(0);pointer-events:all}
.slide.out{opacity:0;transform:translateX(-70px)}

/* BOTTOM NAV */
.bnav{
  display:flex;align-items:center;justify-content:center;gap:1rem;
  padding:.95rem 2rem;
  background:rgba(13,27,42,.92);backdrop-filter:blur(20px);
  border-top:1px solid rgba(255,255,255,.07);
  flex-shrink:0;z-index:20;
}
.nb{
  font-family:'JetBrains Mono',monospace;font-size:.85rem;letter-spacing:.06em;
  padding:.55rem 2rem;border-radius:30px;
  border:1px solid rgba(255,255,255,.18);background:transparent;color:var(--cream);
  cursor:pointer;transition:var(--t);
}
.nb:hover{background:rgba(255,255,255,.09)}
.nb.prim{background:var(--gold);border-color:var(--gold);color:var(--navy);font-weight:700}
.nb.prim:hover{background:var(--gold-l)}
.dots{display:flex;gap:.45rem;align-items:center}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.18);cursor:pointer;transition:var(--t)}
.dot.on{background:var(--gold);transform:scale(1.4)}

/* SLIDE TYPOGRAPHY */
.stag{font-family:'JetBrains Mono',monospace;font-size:.75rem;letter-spacing:.2em;text-transform:uppercase;margin-bottom:.55rem;animation:fuA .5s both}
.stag.b{color:var(--blue-l)}.stag.t{color:var(--teal-l)}.stag.g{color:var(--gold)}
.stitle{font-family:'Playfair Display',serif;font-size:clamp(2rem,3.8vw,3rem);font-weight:900;line-height:1.1;margin-bottom:.85rem;animation:fuA .5s .07s both}
.slead{font-size:1.05rem;color:rgba(250,246,237,.68);line-height:1.65;margin-bottom:1rem;max-width:80ch;animation:fuA .5s .12s both}

@keyframes fuA{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fiA{from{opacity:0}to{opacity:1}}
@keyframes pop{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}

/* FORMULA BOXES */
.fbox{
  border-radius:14px;padding:1.1rem 1.6rem;
  font-family:'JetBrains Mono',monospace;font-size:1.05rem;line-height:2;
  border-left:5px solid;margin-bottom:1rem;animation:fuA .5s .14s both;
}
.fbox.b{background:rgba(58,134,255,.13);border-color:var(--blue)}
.fbox.t{background:rgba(6,214,160,.12);border-color:var(--teal)}
.fbox.r{background:rgba(239,71,111,.12);border-color:var(--red)}
.fbox.g{background:rgba(201,160,32,.13);border-color:var(--gold)}
.fp{display:inline-block;border-radius:7px;padding:.05rem .55rem;margin:0 .12rem;font-weight:700;font-size:1rem}
.fp-be{background:rgba(58,134,255,.3);color:var(--blue-l)}
.fp-vb{background:rgba(6,214,160,.28);color:var(--teal-l)}
.fp-ng{background:rgba(255,209,102,.3);color:var(--amber)}
.fp-no{background:rgba(239,71,111,.28);color:var(--red-l)}
.fp-do{background:rgba(169,123,212,.3);color:#d4a0ff}
.fp-s{background:rgba(255,209,102,.28);color:var(--amber)}
.fp-q{background:rgba(255,255,255,.13);color:#ccc}

/* EXAMPLES */
.exlist{display:flex;flex-direction:column;gap:.55rem}
.ex{border-radius:10px;padding:.72rem 1.1rem;border-left:3px solid;animation:fuA .45s both}
.ex.b{background:rgba(58,134,255,.1);border-color:var(--blue)}
.ex.t{background:rgba(6,214,160,.1);border-color:var(--teal)}
.ex.r{background:rgba(239,71,111,.1);border-color:var(--red)}
.ex.g{background:rgba(201,160,32,.1);border-color:var(--gold)}
.ex:nth-child(1){animation-delay:.1s}.ex:nth-child(2){animation-delay:.18s}
.ex:nth-child(3){animation-delay:.26s}.ex:nth-child(4){animation-delay:.34s}
.ex:nth-child(5){animation-delay:.42s}
.en{font-size:1.05rem;font-weight:600;color:var(--cream);margin-bottom:.2rem}
.en .hb{color:var(--blue-l);font-style:italic}
.en .ht{color:var(--teal-l);font-style:italic}
.en .hg{color:var(--amber);font-style:italic}
.en .hr{color:var(--red-l);font-style:italic}
.fr{font-size:.88rem;color:rgba(250,246,237,.42);font-style:italic}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:.5rem;margin:.5rem 0}
.chip{
  font-family:'JetBrains Mono',monospace;font-size:.85rem;font-weight:700;
  padding:.38rem 1rem;border-radius:24px;animation:pop .4s both;
}
.chip.b{background:rgba(58,134,255,.2);color:var(--blue-l);border:1px solid rgba(58,134,255,.38)}
.chip.t{background:rgba(6,214,160,.17);color:var(--teal-l);border:1px solid rgba(6,214,160,.33)}
.chip:nth-child(1){animation-delay:.05s}.chip:nth-child(2){animation-delay:.1s}
.chip:nth-child(3){animation-delay:.15s}.chip:nth-child(4){animation-delay:.2s}
.chip:nth-child(5){animation-delay:.25s}.chip:nth-child(6){animation-delay:.3s}
.chip:nth-child(7){animation-delay:.35s}.chip:nth-child(8){animation-delay:.4s}
.chip:nth-child(9){animation-delay:.45s}

/* CONJ GRID */
.cjg{display:grid;grid-template-columns:repeat(3,1fr);gap:.55rem;margin:.7rem 0}
.cjc{background:rgba(255,255,255,.07);border-radius:10px;padding:.7rem .85rem;text-align:center;animation:pop .35s both}
.cjc:nth-child(1){animation-delay:.05s}.cjc:nth-child(2){animation-delay:.1s}
.cjc:nth-child(3){animation-delay:.15s}.cjc:nth-child(4){animation-delay:.2s}
.cjc:nth-child(5){animation-delay:.25s}.cjc:nth-child(6){animation-delay:.3s}
.cpro{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:rgba(250,246,237,.35);display:block;margin-bottom:.22rem}
.cform{font-family:'JetBrains Mono',monospace;font-size:1.1rem;font-weight:700;color:var(--blue-l)}
.cform.t{color:var(--teal-l)}

/* BAND */
.band{border-radius:12px;padding:.9rem 1.4rem;font-size:.98rem;line-height:1.6;margin-bottom:.8rem;animation:fuA .5s .2s both}
.band.b{background:rgba(58,134,255,.12);border:1px solid rgba(58,134,255,.25)}
.band.t{background:rgba(6,214,160,.1);border:1px solid rgba(6,214,160,.23)}
.band.g{background:rgba(201,160,32,.1);border:1px solid rgba(201,160,32,.23)}
.band.r{background:rgba(239,71,111,.1);border:1px solid rgba(239,71,111,.23)}

/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:1.1rem}
.card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:1.1rem 1.3rem;animation:fuA .5s both}
.card:nth-child(1){animation-delay:.05s}.card:nth-child(2){animation-delay:.12s}
.card:nth-child(3){animation-delay:.19s}.card:nth-child(4){animation-delay:.26s}
.clabel{font-family:'JetBrains Mono',monospace;font-size:.65rem;letter-spacing:.16em;text-transform:uppercase;opacity:.55;margin-bottom:.45rem}

/* COMPARE TABLE */
.ctbl{width:100%;border-collapse:separate;border-spacing:0 5px}
.ctbl th{font-family:'JetBrains Mono',monospace;font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;padding:.45rem .9rem;text-align:left}
.ctbl th:nth-child(2){color:var(--blue-l)}.ctbl th:nth-child(3){color:var(--teal-l)}
.ctbl td{padding:.7rem .9rem;font-size:.95rem;background:rgba(255,255,255,.04)}
.ctbl tr td:first-child{border-radius:9px 0 0 9px;font-family:'JetBrains Mono',monospace;font-size:.72rem;letter-spacing:.07em;color:rgba(250,246,237,.4)}
.ctbl tr td:nth-child(2){color:var(--blue-l)}
.ctbl tr td:last-child{border-radius:0 9px 9px 0;color:var(--teal-l)}
.mt{margin-top:.7rem}

/* ══════════════════════════════════════
   -ING ANIMATION SLIDE
══════════════════════════════════════ */
.ing-arena{
  display:flex;flex-direction:column;gap:1.4rem;
  margin-top:.4rem;
}
.ing-row{
  display:flex;align-items:center;gap:0;
  font-family:'JetBrains Mono',monospace;
  font-size:2rem;font-weight:700;
  min-height:3.6rem;
  opacity:0;transform:translateY(14px);
  transition:opacity .4s,transform .4s;
}
.ing-row.vis{opacity:1;transform:translateY(0)}
.ir-label{
  font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;
  color:rgba(250,246,237,.32);font-weight:400;font-family:'JetBrains Mono',monospace;
  min-width:9rem;text-align:right;margin-right:1.4rem;
}
.ir-base{color:var(--cream)}
.ir-arrow{color:var(--gold);font-size:1.4rem;margin:0 1rem}

/* Each animated token */
.tok{
  display:inline-block;
  color:var(--cream);
  /* default: no special state */
}
/* The -e that will vanish */
.tok-e{
  color:var(--red-l);
  transition:opacity .45s ease, transform .45s ease, max-width .45s ease;
  max-width:1.4ch;
  overflow:hidden;
}
.tok-e.gone{
  opacity:0;
  transform:translateY(-20px) scale(.5);
  max-width:0;
}
/* The -ie that morphs */
.tok-ie{
  color:var(--amber);
  transition:opacity .4s ease, transform .4s ease, max-width .4s ease;
  max-width:2.8ch;overflow:hidden;
}
.tok-ie.gone{
  opacity:0;transform:translateY(-18px) scale(.4);
  max-width:0;
}
/* The replacement y */
.tok-y{
  color:var(--teal-l);
  opacity:0;transform:translateX(-12px);
  transition:opacity .4s .12s ease, transform .4s .12s ease;
  display:inline-block;
}
.tok-y.show{opacity:1;transform:translateX(0)}
/* The double consonant */
.tok-dbl{
  color:var(--red-l);
  opacity:0;
  transform:translateY(-22px) scale(.3);
  transition:opacity .45s .1s ease, transform .45s .1s cubic-bezier(.34,1.56,.64,1);
  display:inline-block;
}
.tok-dbl.show{opacity:1;transform:translateY(0) scale(1)}
/* The flying -ing suffix */
.tok-ing{
  color:var(--amber);
  opacity:0;
  transform:translateX(60px) translateY(-14px);
  transition:opacity .52s ease, transform .52s cubic-bezier(.22,1,.36,1);
  display:inline-block;
}
.tok-ing.land{opacity:1;transform:translateX(0) translateY(0)}

.rule-note{
  font-family:'Source Serif 4',serif;
  font-size:.88rem;color:rgba(250,246,237,.4);
  margin-left:1.5rem;font-style:italic;font-weight:400;
  font-size:1rem;
}

/* Play button */
.play-btn{
  display:inline-flex;align-items:center;gap:.5rem;
  font-family:'JetBrains Mono',monospace;
  font-size:.82rem;letter-spacing:.08em;
  padding:.5rem 1.5rem;border-radius:28px;
  border:1px solid var(--gold);
  background:transparent;color:var(--gold);
  cursor:pointer;transition:var(--t);
  margin-top:.6rem;align-self:flex-start;
}
.play-btn:hover{background:rgba(201,160,32,.14)}
.play-btn.busy{opacity:.35;pointer-events:none}
</style>
</head>
<body>
<div id="app">
  <div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div>

  <div class="topbar">
    <div class="brand">Marc Vasseur · Polytech Lille · Anglais</div>
    <div class="tab-nav">
      <button class="tab-btn" id="tab-b" onclick="jumpTo('be-ing')">🔵 Present BE + -ING</button>
      <button class="tab-btn" id="tab-t" onclick="jumpTo('simple')">🟢 Present Simple</button>
    </div>
    <div class="sc" id="sc">1 / 13</div>
  </div>

  <div class="sa" id="sa"></div>

  <div class="bnav">
    <button class="nb" onclick="go(-1)">◀ Précédent</button>
    <div class="dots" id="dots"></div>
    <button class="nb prim" onclick="go(1)">Suivant ▶</button>
  </div>
</div>

<script>
const SLIDES = [

/* 0 ── TITRE BE+ING */
{sec:'be-ing',html:`
<div style="display:flex;flex-direction:column;justify-content:center;height:100%;gap:1.8rem">
  <div class="stag b" style="font-size:.85rem">Present BE + -ING</div>
  <div class="stitle" style="font-size:clamp(2.6rem,5.5vw,4.4rem)">Le présent<br><span style="color:var(--blue)">en cours</span></div>
  <div class="slead" style="font-size:1.12rem">Ce temps décrit une action qui <strong style="color:var(--cream)">se déroule en ce moment précis</strong>, une situation temporaire, ou un plan futur arrangé à l'avance.</div>
  <div class="chips">
    <span class="chip b">now</span><span class="chip b">right now</span>
    <span class="chip b">at the moment</span><span class="chip b">currently</span>
    <span class="chip b">at present</span><span class="chip b">look!</span>
    <span class="chip b">listen!</span><span class="chip b">this week</span>
  </div>
</div>`},

/* 1 ── BE CONJUGUÉ */
{sec:'be-ing',html:`
<div class="stag b">Present BE + -ING · Étape 1</div>
<div class="stitle">Le verbe <span style="color:var(--blue)">BE</span> au présent</div>
<div class="slead">Première brique : on conjugue <strong>BE</strong> selon le sujet.</div>
<div class="cjg">
  <div class="cjc"><span class="cpro">I</span><span class="cform">am</span></div>
  <div class="cjc"><span class="cpro">you</span><span class="cform">are</span></div>
  <div class="cjc"><span class="cpro">he / she / it</span><span class="cform">is</span></div>
  <div class="cjc"><span class="cpro">we</span><span class="cform">are</span></div>
  <div class="cjc"><span class="cpro">you (pl.)</span><span class="cform">are</span></div>
  <div class="cjc"><span class="cpro">they</span><span class="cform">are</span></div>
</div>
<div class="band b">
  <strong>Contractions orales/informelles :</strong><br>
  I <strong style="color:var(--blue-l)">am</strong> → I<strong style="color:var(--blue-l)">'m</strong> &nbsp;·&nbsp;
  you/we/they <strong style="color:var(--blue-l)">are</strong> → <strong style="color:var(--blue-l)">'re</strong> &nbsp;·&nbsp;
  he/she/it <strong style="color:var(--blue-l)">is</strong> → <strong style="color:var(--blue-l)">'s</strong>
</div>
<div class="exlist">
  <div class="ex b"><div class="en">I <span class="hb">am</span> a student. → I<span class="hb">'m</span> a student.</div><div class="fr">Je suis étudiant(e).</div></div>
  <div class="ex b"><div class="en">She <span class="hb">is</span> an engineer. → She<span class="hb">'s</span> an engineer.</div><div class="fr">Elle est ingénieure.</div></div>
  <div class="ex b"><div class="en">They <span class="hb">are</span> ready. → They<span class="hb">'re</span> ready.</div><div class="fr">Ils sont prêts.</div></div>
</div>`},

/* 2 ── RÈGLES -ING ANIMÉES */
{sec:'be-ing', id:'ing-slide', html:`
<div class="stag b">Present BE + -ING · Étape 2</div>
<div class="stitle">Ajouter <span style="color:var(--amber)">-ING</span> au verbe</div>
<div class="slead" style="margin-bottom:.4rem">Infinitif sans TO → 4 règles orthographiques.</div>

<div class="ing-arena" id="ing-arena">

  <!-- ROW 0 : cas général -->
  <div class="ing-row" id="irow0">
    <span class="ir-label">Règle générale</span>
    <span class="tok ir-base">work</span>
    <span class="ir-arrow">→</span>
    <span class="tok ir-base">work</span><span class="tok-ing" id="ing0">ing</span>
    <span class="rule-note">+ ing directement</span>
  </div>

  <!-- ROW 1 : -e muet -->
  <div class="ing-row" id="irow1">
    <span class="ir-label">-e muet</span>
    <span class="tok ir-base">mak<span class="tok-e" id="epartA">e</span></span>
    <span class="ir-arrow">→</span>
    <span class="tok ir-base">mak</span><span class="tok-e" id="epartB">e</span><span class="tok-ing" id="ing1">ing</span>
    <span class="rule-note">-e s'efface puis + ing</span>
  </div>

  <!-- ROW 2 : CVC doublement -->
  <div class="ing-row" id="irow2">
    <span class="ir-label">CVC → double</span>
    <span class="tok ir-base">ru<span style="color:var(--teal-l)">n</span></span>
    <span class="ir-arrow">→</span>
    <span class="tok ir-base">ru</span><span class="tok" style="color:var(--teal-l)">n</span><span class="tok-dbl" id="dbl">n</span><span class="tok-ing" id="ing2">ing</span>
    <span class="rule-note">consonne finale doublée</span>
  </div>

  <!-- ROW 3 : -ie → y -->
  <div class="ing-row" id="irow3">
    <span class="ir-label">-ie → y</span>
    <span class="tok ir-base">d<span class="tok-ie" style="color:var(--amber)">ie</span></span>
    <span class="ir-arrow">→</span>
    <span class="tok ir-base">d</span><span class="tok-ie" id="iePart">ie</span><span class="tok-y" id="yPart">y</span><span class="tok-ing" id="ing3">ing</span>
    <span class="rule-note">ie → y puis + ing</span>
  </div>

</div>
<button class="play-btn" id="pbtn" onclick="playIng()">▶ Animer les règles</button>
`},

/* 3 ── AFFIRMATIVE */
{sec:'be-ing',html:`
<div class="stag b">Present BE + -ING · Formation</div>
<div class="stitle">Forme <span style="color:var(--blue)">affirmative</span></div>
<div class="fbox b">
  <span class="fp fp-be">Sujet + BE conjugué</span> + <span class="fp fp-ng">verbe + -ing</span>
</div>
<div class="exlist">
  <div class="ex b"><div class="en">I <span class="hb">am working</span> on a project <span class="hb">right now</span>.</div><div class="fr">Je travaille sur un projet en ce moment.</div></div>
  <div class="ex b"><div class="en">She <span class="hb">is reading</span> the report <span class="hb">at the moment</span>.</div><div class="fr">Elle est en train de lire le rapport.</div></div>
  <div class="ex b"><div class="en">They <span class="hb">are building</span> a new prototype <span class="hb">this week</span>.</div><div class="fr">Ils construisent un nouveau prototype cette semaine.</div></div>
  <div class="ex b"><div class="en">Look! It <span class="hb">is raining</span>.</div><div class="fr">Regarde ! Il pleut.</div></div>

/* ════════════════════════════════════════
   ENGINE
════════════════════════════════════════ */
let cur = 0;
function build(){
  const sa=document.getElementById('sa');
  sa.innerHTML='';
  SLIDES.forEach((s,i)=>{
    const d=document.createElement('div');
    d.className='slide'+(i===0?' active':'');
    d.id='sl'+i;
    d.innerHTML=s.html;
    sa.appendChild(d);
  });
  buildDots();updateUI();
}
function buildDots(){
  const nd=document.getElementById('dots');
  nd.innerHTML='';
  SLIDES.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='dot'+(i===0?' on':'');
    d.onclick=()=>goTo(i);
    nd.appendChild(d);
  });
}
function goTo(idx){
  if(idx<0||idx>=SLIDES.length)return;
  const all=document.querySelectorAll('.slide');
  all[cur].classList.remove('active');
  all[cur].classList.add('out');
  const prev=cur;
  setTimeout(()=>{all[prev].classList.remove('out');},380);
  cur=idx;
  all[cur].classList.add('active');
  updateUI();
}
function updateUI(){
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('on',i===cur));
  document.getElementById('sc').textContent=(cur+1)+' / '+SLIDES.length;
  const sec=SLIDES[cur].sec;
  document.getElementById('tab-b').className='tab-btn'+(sec==='be-ing'?' on-b':'');
  document.getElementById('tab-t').className='tab-btn'+(sec==='simple'?' on-t':'');
}
function go(d){goTo(cur+d);}
function jumpTo(sec){const i=SLIDES.findIndex(s=>s.sec===sec);if(i>=0)goTo(i);}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' ')go(1);
  if(e.key==='ArrowLeft')go(-1);
});

/* ════════════════════════════════════════
   -ING ANIMATION (slide 2)
════════════════════════════════════════ */
function resetIngAnim(){
  // rows invisible
  ['irow0','irow1','irow2','irow3'].forEach(id=>{
    const el=document.getElementById(id);
    if(el)el.classList.remove('vis');
  });
  // -ing tokens: hidden + far right
  ['ing0','ing1','ing2','ing3'].forEach(id=>{
    const el=document.getElementById(id);
    if(el)el.classList.remove('land');
  });
  // -e parts: visible
  ['epartA','epartB'].forEach(id=>{
    const el=document.getElementById(id);
    if(el)el.classList.remove('gone');
  });
  // double consonant
  const dbl=document.getElementById('dbl');
  if(dbl)dbl.classList.remove('show');
  // -ie/-y
  const ie=document.getElementById('iePart');
  const yy=document.getElementById('yPart');
  if(ie)ie.classList.remove('gone');
  if(yy)yy.classList.remove('show');
}

function playIng(){
  const btn=document.getElementById('pbtn');
  if(!btn)return;
  btn.classList.add('busy');
  resetIngAnim();

  const delay=(ms)=>new Promise(r=>setTimeout(r,ms));

  (async()=>{
    // ROW 0 — apparaît, puis -ing vole
    const r0=document.getElementById('irow0');
    if(r0)r0.classList.add('vis');
    await delay(280);
    const i0=document.getElementById('ing0');
    if(i0)i0.classList.add('land');

    // ROW 1
    await delay(650);
    const r1=document.getElementById('irow1');
    if(r1)r1.classList.add('vis');
    await delay(320);
    // -e s'efface
    const eA=document.getElementById('epartA');
    const eB=document.getElementById('epartB');
    if(eA)eA.classList.add('gone');
    await delay(120);
    if(eB)eB.classList.add('gone');
    await delay(360);
    // -ing atterrit
    const i1=document.getElementById('ing1');
    if(i1)i1.classList.add('land');

    // ROW 2
    await delay(680);
    const r2=document.getElementById('irow2');
    if(r2)r2.classList.add('vis');
    await delay(320);
    // double consonne surgit
    const dbl=document.getElementById('dbl');
    if(dbl)dbl.classList.add('show');
    await delay(400);
    const i2=document.getElementById('ing2');
    if(i2)i2.classList.add('land');

    // ROW 3
    await delay(680);
    const r3=document.getElementById('irow3');
    if(r3)r3.classList.add('vis');
    await delay(300);
    // ie disparaît
    const ie=document.getElementById('iePart');
    if(ie)ie.classList.add('gone');
    await delay(240);
    // y arrive
    const yy=document.getElementById('yPart');
    if(yy)yy.classList.add('show');
    await delay(360);
    const i3=document.getElementById('ing3');
    if(i3)i3.classList.add('land');

    await delay(600);
    btn.classList.remove('busy');
    btn.innerHTML='↺ Rejouer';
  })();
}

build();
</script>
