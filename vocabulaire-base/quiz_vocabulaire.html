<head>

<title>Quiz — Petit Vocabulaire Anglais · Jean Rey</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0e0c;--bg2:#171614;--bg3:#1e1c19;
  --gold:#c9a84c;--gold2:#e8c96a;--cream:#f0ead8;
  --muted:#7a7060;--border:#2a2820;--sw:280px;
  --ok:#5a9e52;--ok-bg:#1a2e18;--ok-border:#3a6e34;
  --bad:#c0574a;--bad-bg:#2e1614;--bad-border:#7a3028;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--cream);font-family:'Source Serif 4',serif;display:flex}

/* ── Sidebar ── */
#sidebar{width:var(--sw);min-width:var(--sw);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:18px 16px 12px;border-bottom:1px solid var(--border)}
.sb-title{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:var(--gold)}
.sb-sub{font-size:.65rem;color:var(--muted);margin-top:3px;font-family:'JetBrains Mono',monospace}
.sb-score{padding:12px 16px;border-bottom:1px solid var(--border)}
.sb-score-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.sb-score-label{font-size:.65rem;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.06em}
.sb-score-val{font-size:.8rem;font-family:'JetBrains Mono',monospace;color:var(--gold2)}
.progress-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .4s}
.nav-scroll{flex:1;overflow-y:auto;padding:8px 0}
.nav-scroll::-webkit-scrollbar{width:3px}.nav-scroll::-webkit-scrollbar-thumb{background:var(--border)}
.nav-group{padding:8px 16px 4px;font-size:.6rem;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.08em}
.nav-item{display:flex;align-items:center;gap:8px;padding:5px 16px;cursor:pointer;transition:background .12s;font-size:.7rem;color:var(--cream);font-family:'JetBrains Mono',monospace;line-height:1.3}
.nav-item:hover{background:var(--bg3)}
.nav-item.active{background:var(--bg3);color:var(--gold2)}
.nav-item.active::before{content:'';display:inline-block;width:2px;height:100%;background:var(--gold);position:absolute;left:0}
.nav-item{position:relative}
.nav-num{font-size:.6rem;color:var(--muted);min-width:34px}
.nav-badge{margin-left:auto;font-size:.58rem;padding:1px 5px;border-radius:10px;font-family:'JetBrains Mono',monospace}
.badge-ok{background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok-border)}
.badge-pending{background:var(--bg3);color:var(--muted);border:1px solid var(--border)}

/* ── Main ── */
#main{flex:1;overflow-y:auto;display:flex;flex-direction:column;align-items:center;padding:40px 24px 60px}
#main::-webkit-scrollbar{width:4px}.#main::-webkit-scrollbar-thumb{background:var(--border)}

.lesson-header{text-align:center;margin-bottom:32px;max-width:620px;width:100%}
.lesson-num{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.lesson-title{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:var(--gold);margin-bottom:4px}
.lesson-sub{font-size:.85rem;color:var(--muted);font-style:italic}
.lesson-progress{display:flex;align-items:center;gap:10px;margin-top:12px;justify-content:center}
.lp-bar{width:120px;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.lp-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .3s}
.lp-text{font-size:.65rem;color:var(--muted);font-family:'JetBrains Mono',monospace}

.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;max-width:920px;width:100%}

/* ── Word card ── */
.wcard{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;transition:border-color .2s}
.wcard.state-ok{border-color:var(--ok-border);background:var(--ok-bg)}
.wcard.state-bad{border-color:var(--bad-border);background:var(--bad-bg)}
.wcard-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.wcard-fr{font-size:1rem;font-weight:600;color:var(--cream);line-height:1.3}
.wcard-hint{font-size:.65rem;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:2px}
.wcard-status{font-size:1rem;min-width:20px;text-align:right}
.wcard-input-row{display:flex;gap:6px}
.wcard-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:.82rem;color:var(--cream);font-family:'JetBrains Mono',monospace;outline:none;transition:border-color .2s}
.wcard-input:focus{border-color:var(--gold)}
.wcard-input.inp-ok{border-color:var(--ok);background:rgba(90,158,82,.08)}
.wcard-input.inp-bad{border-color:var(--bad);background:rgba(192,87,74,.08)}
.wcard-input:disabled{opacity:.7}
.wcard-btn{background:transparent;border:1px solid var(--border);border-radius:6px;padding:7px 11px;color:var(--muted);cursor:pointer;font-size:.72rem;font-family:'JetBrains Mono',monospace;transition:all .15s;white-space:nowrap}
.wcard-btn:hover{border-color:var(--gold);color:var(--gold)}
.wcard-feedback{font-size:.7rem;margin-top:7px;font-family:'JetBrains Mono',monospace;min-height:16px}
.fb-ok{color:var(--ok)}.fb-bad{color:var(--bad)}
.wcard-answer{font-size:.75rem;color:var(--gold2);margin-top:4px;font-style:italic;display:none}

.lesson-done-banner{max-width:920px;width:100%;background:var(--bg2);border:1px solid var(--ok-border);border-radius:10px;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;margin-top:8px;display:none}
.ldb-text{font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--ok)}
.ldb-score{font-family:'JetBrains Mono',monospace;font-size:1.1rem;font-weight:500;color:var(--gold2)}
.next-btn{background:var(--gold);color:var(--bg);border:none;border-radius:6px;padding:8px 18px;font-size:.75rem;font-family:'JetBrains Mono',monospace;cursor:pointer;font-weight:500;transition:opacity .15s}
.next-btn:hover{opacity:.85}
.try-again-btn{background:transparent;border:2px solid var(--gold);border-radius:8px;padding:10px 32px;font-size:.82rem;font-family:'JetBrains Mono',monospace;cursor:pointer;color:var(--gold);font-weight:500;letter-spacing:.04em;transition:all .2s}
.try-again-btn:hover{background:var(--gold);color:var(--bg)}
.batch-btn{background:transparent;border:1px solid var(--gold);border-radius:6px;padding:8px 16px;font-size:.75rem;font-family:'JetBrains Mono',monospace;cursor:pointer;color:var(--gold);transition:all .15s}
.batch-btn:hover{background:var(--gold);color:var(--bg)}







.footer-credit{max-width:920px;width:100%;text-align:center;padding:20px 0 4px;font-size:.65rem;color:var(--muted);font-family:'JetBrains Mono',monospace;letter-spacing:.04em;border-top:1px solid var(--border);margin-top:32px}

.welcome{text-align:center;max-width:500px;padding:40px 20px}
.welcome-logo{font-family:'Playfair Display',serif;font-size:2.5rem;font-weight:900;color:var(--gold);margin-bottom:8px}
.welcome-sub{font-size:.9rem;color:var(--muted);margin-bottom:32px;font-style:italic}
.welcome-rule{font-size:.8rem;color:var(--cream);line-height:1.8;margin-bottom:24px}
.start-btn{background:var(--gold);color:var(--bg);border:none;border-radius:8px;padding:12px 32px;font-size:.85rem;font-family:'JetBrains Mono',monospace;cursor:pointer;font-weight:500;transition:opacity .15s}
.start-btn:hover{opacity:.85}

@media(max-width:680px){
  #sidebar{display:none}
  .cards-grid{grid-template-columns:1fr}
  .lesson-title{font-size:1.4rem}
}
</style>
</head>

//  ÉTAT
// ═══════════════════════════════════════════════════

// ═══════════════════════════════════════════════════
//  CHARGEMENT LEÇON
// ═══════════════════════════════════════════════════
function loadLesson(idx){
  state.currentLesson=idx;
  const lesson=LESSONS[idx];
  // Nav active
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const navEl=document.getElementById('nav-'+lesson.id);
  if(navEl){navEl.classList.add('active');navEl.scrollIntoView({block:'nearest'});}

  const area=document.getElementById('quiz-area');
  area.innerHTML='';

  // Header
  const hdr=document.createElement('div');
  hdr.className='lesson-header';
  const sc=state.scores[lesson.id];
  const pct=sc?Math.round(sc.correct/sc.total*100):0;
  const done=sc&&sc.total===lesson.words.length;
  hdr.innerHTML=`
    <div class="lesson-num">Leçon ${lesson.num}</div>
    <div class="lesson-title">${lesson.title}</div>
    <div class="lesson-sub">${lesson.fr}</div>
    <div class="lesson-progress">
      <div class="lp-bar"><div class="lp-fill" id="lp-fill" style="width:${sc?pct:0}%"></div></div>
      <div class="lp-text" id="lp-text">${sc?sc.correct+'/'+sc.total+' ('+pct+'%)':'0 / 20'}</div>
    </div>`;
  area.appendChild(hdr);

  // Banner fin de leçon si déjà terminée
  const banner=document.createElement('div');
  banner.className='lesson-done-banner';banner.id='done-banner';
  if(done){
    banner.style.display='flex';
    const nextIdx=idx+1<LESSONS.length?idx+1:null;
    banner.innerHTML=`<span class="ldb-text">✓ Leçon terminée</span><span class="ldb-score">${sc.correct}/${sc.total} — ${pct}%</span>${nextIdx!==null?`<button class="next-btn" onclick="loadLesson(${nextIdx})">Leçon suivante →</button>`:'<span style="font-size:.72rem;color:var(--muted);font-family:JetBrains Mono,monospace">Bravo, toutes les leçons terminées !</span>'}`;
  }
  area.appendChild(banner);

  // Grille mixte : 10 FR→EN + 10 EN→FR tirés aléatoirement
  const BATCH = 20;
  const half = BATCH / 2;
  const pool = shuffle([...lesson.words]);
  const frWords = pool.slice(0, half);          // 10 FR→EN
  const enWords = pool.slice(half, BATCH);      // 10 EN→FR (si dispo)

  // Section FR→EN
  const secFR = document.createElement('div');
  secFR.style.cssText='max-width:920px;width:100%;margin-bottom:8px';
  const labelFR = lesson.id==='app2' ? 'Quel est le vrai sens ? (anglais → sens français)'
    : lesson.id==='app3' ? 'Infinitif → Prétérit'
    : 'Français → Anglais';
  secFR.innerHTML='<div style="font-size:.62rem;color:var(--muted);font-family:\'JetBrains Mono\',monospace;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;padding-left:2px">'+labelFR+'</div>';
  const gridFR = document.createElement('div');
  gridFR.className='cards-grid';
  frWords.forEach(w=>{
    const origIdx=lesson.words.indexOf(w);
    gridFR.appendChild(makeCard(lesson,w,origIdx,false,'fr'));
  });
  secFR.appendChild(gridFR);
  area.appendChild(secFR);

  // Section EN→FR
  const secEN = document.createElement('div');
  secEN.style.cssText='max-width:920px;width:100%;margin-bottom:8px';
  const labelEN = lesson.id==='app2' ? 'Faux amis — série 2 (vrai sens)' 
    : lesson.id==='app3' ? 'Prétérit → Infinitif'
    : 'Anglais → Français';
  secEN.innerHTML='<div style="font-size:.62rem;color:var(--muted);font-family:\'JetBrains Mono\',monospace;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;padding-left:2px">'+labelEN+'</div>';
  const gridEN = document.createElement('div');
  gridEN.className='cards-grid';
  enWords.forEach(w=>{
    const origIdx=lesson.words.indexOf(w);
    gridEN.appendChild(makeCard(lesson,w,origIdx,false,'en'));
  });
  secEN.appendChild(gridEN);
  area.appendChild(secEN);

  // Bouton Try Again — toujours visible
  const tryBtn = document.createElement('div');
  tryBtn.id='try-again-wrap';
  tryBtn.style.cssText='max-width:920px;width:100%;margin-top:16px;text-align:center';
  tryBtn.innerHTML=`<button class="try-again-btn" onclick="tryAgain(${idx})">↺ Try Again</button>`;
  area.appendChild(tryBtn);

  // Footer credit
  const footer=document.createElement('div');
  footer.className='footer-credit';
  footer.innerHTML='Exercises designed by Marc VASSEUR, Polytech Lille — Lille University';
  area.appendChild(footer);
}

// ═══════════════════════════════════════════════════
//  CARTE MOT
// ═══════════════════════════════════════════════════
function makeCard(lesson,word,index,alreadyDone,dir){
  // dir='fr' → affiche FR, attend EN   |   dir='en' → affiche EN, attend FR
  dir=dir||'fr';
  const cardKey=lesson.id+'_'+index+'_'+dir;
  const card=document.createElement('div');
  card.className='wcard';
  card.id='card-'+cardKey;

  // Special lessons: app2 (faux amis) and app3 (verbes) always go fr→answers
  const isSpecial = lesson.id==='app2' || lesson.id==='app3';
  const effectiveDir = isSpecial ? 'fr' : dir;
  const prompt  = effectiveDir==='fr' ? word.fr    : word.en[0];
  let answers;
  if(effectiveDir==='fr'){
    answers = word.en;
  } else if(lesson.id==='app3'){
    // For verbs: "fly → prét." displayed as "flew", accept just the infinitive "fly"
    const stem = word.fr.replace(/\s*→.*$/, '').trim();
    answers = [stem, word.fr];
  } else {
    answers = [word.fr];
  }
  // Smart placeholder
  let placeholder;
  if(lesson.id==='app2') placeholder='Vrai sens en français…';
  else if(lesson.id==='app3') placeholder='Prétérit en anglais…';
  else if(effectiveDir==='fr') placeholder='Tapez en anglais…';
  else placeholder='Tapez en français…';
  const hint = answers[0].length>12?'('+answers[0].length+' lettres / letters)':'';
  const alts = answers.length>1?'<br><span style="font-size:.6rem;color:var(--muted)">ou : '+answers.slice(1).join(' / ')+'</span>':'';

  // Store answers safely as JSON in a data attribute — avoids ALL quoting issues
  card.dataset.answers=JSON.stringify(answers);
  card.dataset.cardkey=cardKey;
  card.innerHTML=`
    <div class="wcard-top">
      <div>
        <div class="wcard-fr">${prompt}</div>
        ${hint?`<div class="wcard-hint">${hint}</div>`:''}
      </div>
      <div class="wcard-status" id="st-${cardKey}"></div>
    </div>
    <div class="wcard-input-row">
      <input class="wcard-input" id="inp-${cardKey}" placeholder="${placeholder}"
        onkeydown="if(event.key==='Enter')checkWordById('${cardKey}')"
        ${alreadyDone?'disabled':''}>
      <button class="wcard-btn" onclick="checkWordById('${cardKey}')" ${alreadyDone?'disabled':''}>OK</button>
    </div>
    <div class="wcard-feedback" id="fb-${cardKey}"></div>
    <div class="wcard-answer" id="ans-${cardKey}">${alts}</div>`;

  // Si déjà terminé, restaurer l'état
  if(alreadyDone){
    const prevData=getWordResult(cardKey);
    if(prevData){
      const inp=card.querySelector('.wcard-input');
      inp.value=prevData.val;
      applyResult(card,cardKey,prevData.ok,prevData.val,answers,true);
    }
  }
  return card;
}

// Stockage résultats mot par mot
const wordResults={};
function storeWordResult(key,ok,val){wordResults[key]={ok,val};}
function getWordResult(key){return wordResults[key];}

// ═══════════════════════════════════════════════════
//  VÉRIFICATION
// ═══════════════════════════════════════════════════
// Articles FR et EN à ignorer en comparaison
const ARTICLES=/^(le |la |les |l'|l'|un |une |des |the |a |an )+/i;

function normalize(s){
  return s.trim().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[''`]/g,"'")
    .replace(/[-–]/g,' ')
    .replace(/\s+/g,' ');
}

function stripArticle(s){
  return normalize(s).replace(ARTICLES,'').trim();
}

function checkWordById(cardKey){
  // Retrieve answers from the card's data attribute — safe from quoting issues
  const card=document.getElementById('card-'+cardKey);
  if(!card)return;
  const answers=JSON.parse(card.dataset.answers||'[]');
  checkWord(cardKey,answers);
}

function checkWord(cardKey,answers){
  const inp=document.getElementById('inp-'+cardKey);
  if(!inp||inp.disabled)return;
  const val=inp.value;
  if(!val.trim())return;

  const nv=normalize(val);
  // Match : exact OU sans article des deux côtés (face = le visage, epaule = l'épaule…)
  const snv=stripArticle(nv);
  const strict=answers.some(a=>{
    const na=normalize(a);
    const sa=stripArticle(a);
    return na===nv || sa===nv || na===snv || sa===snv;
  });

  applyResult(document.getElementById('card-'+cardKey),cardKey,strict,val,answers,false);
  storeWordResult(cardKey,strict,val);
  // Extract lessonId from cardKey (format: lessonId_index_dir)
  const parts=cardKey.split('_');
  const lessonId=parts.slice(0,-2).join('_');
  const index=parseInt(parts[parts.length-2]);
  updateLessonScore(lessonId,index,strict);
}

function applyResult(card,cardKey,ok,val,answers,restore){
  const inp=document.getElementById('inp-'+cardKey);
  const fb=document.getElementById('fb-'+cardKey);
  const st=document.getElementById('st-'+cardKey);
  const ans=document.getElementById('ans-'+cardKey);

  inp.disabled=true;
  if(ok){
    card.classList.add('state-ok');
    inp.classList.add('inp-ok');
    fb.textContent='✓ Correct !';fb.className='wcard-feedback fb-ok';
    st.textContent='✓';
  } else {
    card.classList.add('state-bad');
    inp.classList.add('inp-bad');
    fb.textContent='✗ Réponse : '+answers[0];fb.className='wcard-feedback fb-bad';
    st.textContent='✗';
    if(ans){ans.style.display='block';}
  }
}

function updateLessonScore(lessonId,index,ok){
  const lesson=LESSONS.find(l=>l.id===lessonId);
  if(!state.scores[lessonId])state.scores[lessonId]={correct:0,total:0,answered:new Set()};
  const sc=state.scores[lessonId];
  if(sc.answered.has(index))return;
  sc.answered.add(index);
  sc.total++;
  if(ok)sc.correct++;

  // Update header progress
  const pct=Math.round(sc.correct/sc.total*100);
  const fill=document.getElementById('lp-fill');
  const txt=document.getElementById('lp-text');
  const batchSize=20;
  if(fill)fill.style.width=Math.round(sc.total/batchSize*100)+'%';
  if(txt)txt.textContent=sc.correct+'/'+sc.total+' ('+pct+'%)';

  // Badge nav
  const badge=document.getElementById('badge-'+lessonId);
  if(badge){
    badge.textContent=sc.correct+'/'+sc.total;
    if(sc.total===batchSize){
      badge.className='nav-badge badge-ok';
      showDoneBanner(lessonId,pct);
    }
  }
  // Global score
  updateGlobal();
}

function showDoneBanner(lessonId,pct){
  const banner=document.getElementById('done-banner');
  if(!banner)return;
  const idx=LESSONS.findIndex(l=>l.id===lessonId);
  const sc=state.scores[lessonId];
  const nextIdx=idx+1<LESSONS.length?idx+1:null;
  banner.style.display='flex';
  banner.innerHTML=`<span class="ldb-text">✓ Leçon terminée</span><span class="ldb-score">${sc.correct}/${sc.total} — ${pct}%</span><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="batch-btn" onclick="loadNextBatch('${lessonId}')">+20 mots suivants ⟳</button>${nextIdx!==null?`<button class="next-btn" onclick="loadLesson(${nextIdx})">Leçon suivante →</button>`:'<span style="font-size:.72rem;color:var(--muted);font-family:JetBrains Mono,monospace">Toutes les leçons terminées !</span>'}</div>`;
}

function tryAgain(idx){
  // Réinitialiser le score de la leçon courante et recharger
  const lesson=LESSONS[idx];
  if(!lesson)return;
  delete state.scores[lesson.id];
  Object.keys(wordResults).filter(k=>k.startsWith(lesson.id+'_')).forEach(k=>delete wordResults[k]);
  // Reset batch pool so new random selection
  delete batchPool[lesson.id];
  delete batchOffset[lesson.id];
  loadLesson(idx);
}

function updateGlobal(){
  let tot=0,cor=0;
  Object.values(state.scores).forEach(s=>{tot+=s.total;cor+=s.correct;});
  document.getElementById('g-score').textContent=cor+' / '+tot;
  const pct=tot?Math.round(cor/tot*100):0;
  document.getElementById('g-bar').style.width=pct+'%';
}


// ═══════════════════════════════════════════════════
//  SHUFFLE — Fisher-Yates
// ═══════════════════════════════════════════════════
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

// ═══════════════════════════════════════════════════
//  BATCH SUIVANT — tire 20 mots aléatoires des mots
//  non encore vus dans cette leçon (si tous vus, repart de zéro)
// ═══════════════════════════════════════════════════
const batchOffset={};  // lessonId -> index de départ dans pool mélangé
const batchPool={};    // lessonId -> ordre mélangé permanent pour cette session

function loadNextBatch(lessonId){
  const lesson=LESSONS.find(l=>l.id===lessonId);
  if(!lesson)return;

  // Construire / récupérer pool mélangé pour cette leçon
  if(!batchPool[lessonId]) batchPool[lessonId]=shuffle([...Array(lesson.words.length).keys()]);
  if(!batchOffset[lessonId]) batchOffset[lessonId]=0;

  let start=batchOffset[lessonId];
  // Si on a dépassé la fin, on repart du début avec un nouveau mélange
  if(start>=lesson.words.length){
    batchPool[lessonId]=shuffle([...Array(lesson.words.length).keys()]);
    start=0;
  }
  const batchSize=Math.min(20,lesson.words.length-start);
  const indices=batchPool[lessonId].slice(start,start+batchSize);
  batchOffset[lessonId]=start+batchSize;

  // Réinitialiser le score de cette leçon pour le nouveau batch
  state.scores[lessonId]={correct:0,total:0,answered:new Set()};
  Object.keys(wordResults).filter(k=>k.startsWith(lessonId+'_')).forEach(k=>delete wordResults[k]);

  // Remplacer la grille
  const grid=document.getElementById('cards-grid');
  if(!grid)return;
  grid.innerHTML='';
  indices.forEach(origIdx=>{
    const w=lesson.words[origIdx];
    grid.appendChild(makeCard(lesson,w,origIdx,false));
  });

  // Masquer le banner et réinitialiser progress
  const banner=document.getElementById('done-banner');
  if(banner)banner.style.display='none';
  const fill=document.getElementById('lp-fill');
  const txt=document.getElementById('lp-text');
  if(fill)fill.style.width='0%';
  if(txt)txt.textContent='0 / '+batchSize;
  updateGlobal();

  // Focus premier champ
  const first=grid.querySelector('.wcard-input');
  if(first)first.focus();
}
