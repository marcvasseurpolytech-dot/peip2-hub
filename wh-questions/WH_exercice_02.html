<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>WH-Questions · Exercice 2 · Polytech Lille</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{--navy:#0d1b2a;--gold:#C9A020;--gold-l:#e8b84b;--cream:#FAF6ED;--teal:#06d6a0;--teal-l:#a8f0de;--red:#ef476f;--red-l:#ffb3c6;--amber:#ffd166;--green:#2ecc71;--green-l:#a8f0c0}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:var(--navy);color:var(--cream);font-family:'Source Serif 4',serif}
.hdr{position:sticky;top:0;z-index:50;background:rgba(13,27,42,.95);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.07);padding:.6rem 1.2rem;display:flex;align-items:center;justify-content:space-between;gap:.5rem;flex-wrap:wrap}
.brand{font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--gold)}
.exnum{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:rgba(250,246,237,.4);letter-spacing:.1em}
.prog-t{height:4px;background:rgba(255,255,255,.1);border-radius:3px;flex:1;min-width:80px;max-width:180px;overflow:hidden}
.prog-f{height:100%;background:var(--gold);border-radius:3px;transition:width .3s}
.sc-pill{font-family:'JetBrains Mono',monospace;font-size:.68rem;padding:.22rem .6rem;border-radius:12px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);color:rgba(250,246,237,.7)}
main{max-width:600px;margin:0 auto;padding:1rem 1rem 3rem}
.splash{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 56px);gap:1.3rem;text-align:center;padding:1rem}
.splash-title{font-family:'Source Serif 4',serif;font-size:2.2rem;font-weight:600;line-height:1.1}
.splash-title span{color:var(--gold)}
.start-btn{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:.9rem;letter-spacing:.08em;padding:.75rem 2.4rem;border-radius:30px;background:var(--gold);color:var(--navy);border:none;cursor:pointer;transition:.2s;margin-top:.5rem}
.start-btn:hover{background:var(--gold-l);transform:translateY(-1px)}
.qcard{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:1.3rem 1.3rem 1.1rem;margin-bottom:1rem;animation:su .3s both}
@keyframes su{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.qmeta{display:flex;align-items:center;gap:.5rem;margin-bottom:.8rem;flex-wrap:wrap}
.qnum{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:rgba(250,246,237,.32);letter-spacing:.1em}
.sentence{font-size:1.1rem;font-weight:600;line-height:1.6;color:var(--cream);margin-bottom:1rem}
.underlined{text-decoration:underline;text-decoration-color:var(--gold);text-underline-offset:3px;color:var(--gold-l)}
.type-wrap{display:flex;gap:.55rem;align-items:center}
.type-input{flex:1;font-family:'JetBrains Mono',monospace;font-size:.95rem;font-weight:700;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.18);border-radius:10px;color:var(--cream);padding:.6rem .85rem;outline:none;transition:.18s;-webkit-appearance:none}
.type-input:focus{border-color:var(--gold);background:rgba(255,255,255,.1)}
.type-input.ok{border-color:var(--green);background:rgba(46,204,113,.12);color:var(--green-l)}
.type-input.near{border-color:var(--amber);background:rgba(255,209,102,.1);color:var(--amber)}
.type-input.ko{border-color:var(--red);background:rgba(239,71,111,.12);color:var(--red-l)}
.ok-btn{font-family:'JetBrains Mono',monospace;font-size:.82rem;font-weight:700;padding:.6rem 1.1rem;border-radius:10px;background:var(--gold);color:var(--navy);border:none;cursor:pointer;transition:.18s;flex-shrink:0}
.ok-btn:hover{background:var(--gold-l)}
.ok-btn:disabled{opacity:.35;pointer-events:none}
.fb{margin-top:.8rem;padding:.7rem .95rem;border-radius:10px;font-size:.9rem;line-height:1.55;animation:su .25s both}
.fb.ok{background:rgba(46,204,113,.11);border:1px solid rgba(46,204,113,.25);color:var(--green-l)}
.fb.near{background:rgba(255,209,102,.11);border:1px solid rgba(255,209,102,.25);color:var(--amber)}
.fb.ko{background:rgba(239,71,111,.11);border:1px solid rgba(239,71,111,.25);color:var(--red-l)}
.fb strong{color:var(--cream)}
.rule-box{margin-top:.4rem;padding:.45rem .65rem;background:rgba(255,255,255,.05);border-radius:7px;font-size:.83rem;color:rgba(250,246,237,.6);border-left:2px solid rgba(255,255,255,.18)}
.nxt-btn{width:100%;margin-top:.85rem;font-family:'JetBrains Mono',monospace;font-size:.85rem;font-weight:700;letter-spacing:.06em;padding:.68rem;border-radius:12px;background:var(--gold);color:var(--navy);border:none;cursor:pointer;transition:.18s;display:none}
.nxt-btn.show{display:block}
.nxt-btn:hover{background:var(--gold-l)}
.results{animation:su .4s both;padding:1rem 0 3rem}
.rh{text-align:center;margin-bottom:1.6rem}
.rscore{font-family:'Source Serif 4',serif;font-size:3.4rem;font-weight:600;color:var(--gold);line-height:1}
.rlabel{font-size:.9rem;color:rgba(250,246,237,.45);margin-top:.25rem}
.rgrade{font-family:'JetBrains Mono',monospace;font-size:1.05rem;font-weight:700;margin-top:.55rem}
.rbar-wrap{height:7px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden;margin:.4rem 0}
.rbar{height:100%;background:var(--gold);border-radius:4px;transition:width 1s cubic-bezier(.2,1,.3,1)}
.restart{width:100%;font-family:'JetBrains Mono',monospace;font-size:.9rem;font-weight:700;padding:.8rem;border-radius:14px;background:var(--gold);color:var(--navy);border:none;cursor:pointer;transition:.18s;margin-top:1rem}
.restart:hover{background:var(--gold-l)}

.tag-wh{color:var(--gold);font-weight:800}
.tag-aux{color:#7fb4ff;font-weight:700}
.tag-prep{color:var(--teal-l);font-weight:800;text-decoration:underline;text-decoration-style:dotted;text-underline-offset:3px}
.legend{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:rgba(250,246,237,.4);margin:-.4rem 0 .8rem;letter-spacing:.02em}
</style>
</head>
<body>
<div class="hdr" id="hdr" style="display:none">
  <div class="brand">Marc Vasseur · Polytech Lille</div>
  <div class="exnum">Exercice 2 / 10</div>
  <div class="prog-t"><div class="prog-f" id="pf" style="width:0%"></div></div>
  <div class="sc-pill" id="sc">0 / 20</div>
</div>
<main id="main">
  <div class="splash" id="splash">
    <div class="splash-title">WH-Questions<br><span>Exercice 2</span></div>
    <div style="font-size:.95rem;color:rgba(250,246,237,.55);max-width:34ch;line-height:1.65;text-align:center">
      20 phrases · Pose la question sur le mot souligné<br>
      <em style="font-size:.82rem;color:rgba(250,246,237,.35)">Ordre identique au PDF</em>
    </div>
    <button class="start-btn" onclick="start()">▶ Commencer</button>
    <div style="font-family:'JetBrains Mono',monospace;font-size:.58rem;color:rgba(250,246,237,.2);letter-spacing:.1em;text-transform:uppercase">Polytech Lille · PEIP2 Remédiation</div>
  </div>
</main>

<script>
const QS = [{s:"She is going to work part-time because of her studies.",u:"because of her studies",q:"Why is she going to work part-time?"},{s:"She is going to defend her PhD in June.",u:"in June",q:"When is she going to defend her PhD?"},{s:"She finishes work at 6 PM.",u:"at 6 PM",q:"When does she finish work?"},{s:"She has presented at four international conferences.",u:"four international conferences",q:"How many conferences has she presented at?"},{s:"She is performing very well in her new role.",u:"very well",q:"How is she performing in her new role?"},{s:"He has applied for a research grant.",u:"a research grant",q:"What has he applied for?"},{s:"She had been working remotely since the lockdown.",u:"since the lockdown",q:"Since when had she been working remotely?"},{s:"She presented the findings at the annual conference.",u:"at the annual conference",q:"Where did she present the findings?"},{s:"She had lived in three countries before settling in France.",u:"three countries",q:"How many countries had she lived in before settling in France?"},{s:"She was revising the code because there were several errors.",u:"because there were several errors",q:"Why was she revising the code?"},{s:"The technician had repaired the machine before the meeting.",u:"The technician",q:"Who had repaired the machine before the meeting?",n:"Who = sujet → pas d\'auxiliaire"},{s:"They flew to Tokyo last summer.",u:"to Tokyo",q:"Where did they fly last summer?"},{s:"He will be giving a keynote at this time next week.",u:"a keynote",q:"What will he be giving at this time next week?"},{s:"He works in this department because he loves robotics.",u:"because he loves robotics",q:"Why does he work in this department?"},{s:"They are going to hire a data scientist.",u:"a data scientist",q:"What are they going to hire?"},{s:"He was training the new recruits all week.",u:"all week",q:"How long was he training the new recruits?"},{s:"She had completed the analysis before the presentation started.",u:"before the presentation started",q:"When had she completed the analysis?"},{s:"They had been running the pilot in two test cities.",u:"in two test cities",q:"Where had they been running the pilot?"},{s:"She has quit because of the working conditions.",u:"because of the working conditions",q:"Why has she quit?"},{s:"The committee had rejected the proposal.",u:"The committee",q:"Who had rejected the proposal?",n:"Who = sujet → pas d\'auxiliaire"}];
let cur=0, ok=0;

const AUX_LIST=["is","are","was","were","am","do","does","did","have","has","had","will","would","can","could","should","must","might","shall"];
const PREPOSITIONS=["with","for","to","at","on","in","about","from","of","into","onto","by","over"];
const IGNORABLE=["the","a","an","that","which"];
const ENC_OK=["Nickel !","Parfait !","Impeccable !","Très bien !","Exactement ça !"];
const ENC_NEAR=["Tu y es presque !","Bien vu, juste un petit détail à ajuster.","Presque parfait !"];
const ENC_KO=["Pas grave, on progresse à chaque essai !","Regarde bien la correction, tu vas y arriver.","C'est en se trompant qu'on apprend, courage !"];
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}

function norm(s){
  return s.toLowerCase().trim()
    .replace(/[‘’]/g,"'")
    .replace(/…/g,' ')
    .replace(/\.\.\./g,' ')
    .replace(/[?.,!]/g,'')
    .replace(/\s+/g,' ').trim();
}
function tokenize(s){return norm(s).split(/\s+/).filter(Boolean);}
function lev(a,b){
  const dp=Array.from({length:a.length+1},(_,i)=>[i,...Array(b.length).fill(0)]);
  for(let j=1;j<=b.length;j++)dp[0][j]=j;
  for(let i=1;i<=a.length;i++)for(let j=1;j<=b.length;j++)
    dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[a.length][b.length];
}

function analyze(correctQ){
  const toks=tokenize(correctQ);
  const wh=toks[0];
  let aux=null;
  if(AUX_LIST.includes(toks[1]))aux=toks[1];
  let prep=null;
  const last=toks[toks.length-1];
  if(PREPOSITIONS.includes(last))prep=last;
  return {toks,wh,aux,prep};
}

function diffWords(correct,user){
  const c=tokenize(correct), u=tokenize(user);
  const uCount={};
  u.forEach(w=>uCount[w]=(uCount[w]||0)+1);
  const missing=[];
  c.forEach(w=>{ if(uCount[w]>0){uCount[w]--;} else {missing.push(w);} });
  return missing;
}

function check(user,q){
  const u=norm(user), c=norm(q.q);
  if(u===c)return {status:'ok',missing:[]};
  const missing=diffWords(q.q,user);
  const info=analyze(q.q);
  if(missing.length===0){
    if(lev(u,c)<=3)return {status:'ok',missing:[]};
    return {status:'near',missing:[]};
  }
  if(info.prep && missing.includes(info.prep)){
    return {status:'near',missing,prepMissing:true,prep:info.prep};
  }
  if(missing.every(w=>IGNORABLE.includes(w))){
    return {status:'ok-minor',missing};
  }
  if(lev(u,c)<=3)return {status:'near',missing};
  return {status:'ko',missing};
}

function buildSentenceHtml(s,u){
  const idx=s.indexOf(u);
  if(idx===-1)return '<span>'+s+'</span>';
  return s.slice(0,idx)+'<span class="underlined">'+u+'</span>'+s.slice(idx+u.length);
}

function buildAnnotatedQuestion(q){
  const info=analyze(q.q);
  const hasQ=q.q.trim().endsWith('?');
  const core=hasQ?q.q.trim().slice(0,-1):q.q.trim();
  const words=core.split(/\s+/);
  const html=words.map((w,i)=>{
    const lw=w.toLowerCase().replace(/[^a-z']/g,'');
    if(i===0)return `<span class="tag-wh" title="Mot interrogatif">${w}</span>`;
    if(info.aux && i===1 && lw===info.aux)return `<span class="tag-aux" title="Auxiliaire">${w}</span>`;
    if(info.prep && i===words.length-1 && lw===info.prep)return `<span class="tag-prep" title="Préposition liée au verbe">${w}</span>`;
    return w;
  }).join(' ');
  return html+(hasQ?'?':'');
}

function start(){
  document.getElementById('splash').style.display='none';
  document.getElementById('hdr').style.display='flex';
  render();
}

function render(){
  if(cur>=QS.length){showResults();return;}
  const q=QS[cur];
  document.getElementById('pf').style.width=((cur/QS.length)*100)+'%';
  document.getElementById('sc').textContent=ok+' / '+QS.length;
  document.getElementById('main').innerHTML=`
  <div class="qcard">
    <div class="qmeta"><span class="qnum">Q${cur+1} / ${QS.length}</span></div>
    <div class="sentence">${buildSentenceHtml(q.s,q.u)}</div>
    ${cur===0?'<div class="legend">🟡 mot interrogatif · 🔵 auxiliaire · 🟢 préposition liée au verbe</div>':''}
    <div class="type-wrap">
      <input class="type-input" id="ti" type="text" placeholder="Pose la question…"
        autocorrect="off" autocapitalize="off" spellcheck="false"
        onkeydown="if(event.key==='Enter')submit()">
      <button class="ok-btn" id="ob" onclick="submit()">OK</button>
    </div>
    <div id="fb"></div>
    <button class="nxt-btn" id="nb" onclick="next()">Question suivante →</button>
  </div>`;
  setTimeout(()=>{const el=document.getElementById('ti');if(el)el.focus();},100);
}

function submit(){
  const inp=document.getElementById('ti');
  const ob=document.getElementById('ob');
  if(!inp||ob.disabled)return;
  const val=inp.value.trim();if(!val)return;
  ob.disabled=true;inp.disabled=true;
  const q=QS[cur];
  const res=check(val,q);
  const annotated=buildAnnotatedQuestion(q);
  const note=q.n?`<div class="rule-box">${q.n}</div>`:'';
  const fb=document.getElementById('fb');

  if(res.status==='ok'||res.status==='ok-minor'||res.status==='near')ok++;

  if(res.status==='ok'){
    inp.className='type-input ok';
    fb.innerHTML=`<div class="fb ok">✓ <strong>${pick(ENC_OK)}</strong> ${annotated}${note}</div>`;
  } else if(res.status==='ok-minor'){
    inp.className='type-input ok';
    fb.innerHTML=`<div class="fb near">☑ <strong>Correct !</strong> Tu as juste oublié « ${res.missing.join(', ')} » — un petit mot qui ne change pas la grammaire ici. ${annotated}${note}</div>`;
  } else if(res.status==='near' && res.prepMissing){
    inp.className='type-input near';
    fb.innerHTML=`<div class="fb near">~ <strong>Presque !</strong> Il manque la préposition <strong style="color:var(--teal-l)">${res.prep}</strong>, qui fait partie du verbe ici (regarde la phrase annotée ci-dessous). ${annotated}${note}</div>`;
  } else if(res.status==='near'){
    inp.className='type-input near';
    fb.innerHTML=`<div class="fb near">~ <strong>${pick(ENC_NEAR)}</strong> Réponse attendue : ${annotated}${note}</div>`;
  } else {
    inp.className='type-input ko';
    fb.innerHTML=`<div class="fb ko">✗ <strong>${pick(ENC_KO)}</strong> Réponse attendue : ${annotated}${note}</div>`;
  }
  document.getElementById('sc').textContent=ok+' / '+QS.length;
  document.getElementById('nb').classList.add('show');
}

function next(){cur++;render();}

function showResults(){
  document.getElementById('hdr').style.display='none';
  const pct=Math.round(ok/QS.length*100);
  const grade=pct>=90?'🏆 Excellent !':pct>=75?'✅ Bien joué !':pct>=55?'📚 Pas mal, continue !':'💪 Courage, ça va venir !';
  const msg=pct>=90?'Tu maîtrises très bien les WH-Questions.':pct>=75?'Continue comme ça, tu progresses bien !':pct>=55?'Encore un peu de pratique et ce sera top.':'Retente l\'exercice, la répétition va payer !';
  document.getElementById('main').innerHTML=`
  <div class="results">
    <div class="rh">
      <div class="rscore">${pct}%</div>
      <div class="rlabel">${ok} / ${QS.length} questions correctes</div>
      <div class="rgrade">${grade}</div>
      <div style="font-size:.85rem;color:rgba(250,246,237,.5);margin-top:.5rem;max-width:32ch;margin-left:auto;margin-right:auto">${msg}</div>
    </div>
    <div style="background:rgba(255,255,255,.05);border-radius:14px;padding:1rem 1.2rem;margin-bottom:1rem">
      <div style="display:flex;justify-content:space-between;margin-bottom:.4rem">
        <span style="font-size:.9rem;color:rgba(250,246,237,.5)">Score</span>
        <span style="font-family:'JetBrains Mono',monospace;font-weight:700">${ok} / ${QS.length}</span>
      </div>
      <div class="rbar-wrap"><div class="rbar" id="rb" style="width:0%"></div></div>
    </div>
    <button class="restart" onclick="location.reload()">↻ Recommencer l'exercice</button>
  </div>`;
  setTimeout(()=>{const b=document.getElementById('rb');if(b)b.style.width=pct+'%';},200);
}
</script>
</body>
</html>
