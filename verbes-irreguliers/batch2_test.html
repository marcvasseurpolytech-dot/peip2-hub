<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Verbes irréguliers · Batch 2 · Verbes courants</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0d1b2a;--gold:#C9A020;--gold-l:#e8b84b;--cream:#FAF6ED;
  --red:#ef476f;--red-l:#ffb3c6;--amber:#ffd166;
  --green:#2ecc71;--green-l:#a8f0c0;
  --col:#6ec96e;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:var(--navy);color:var(--cream);font-family:'Source Serif 4',serif}
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;animation:drift 20s ease-in-out infinite alternate}
.o1{width:500px;height:500px;background:color-mix(in srgb,var(--col) 12%,transparent);top:-160px;left:-130px}
.o2{width:400px;height:400px;background:color-mix(in srgb,var(--col) 7%,transparent);bottom:-120px;right:-80px;animation-delay:-8s}
@keyframes drift{from{transform:translate(0,0)}to{transform:translate(45px,30px)}}

/* HDR */
.hdr{position:sticky;top:0;z-index:100;background:rgba(13,27,42,.94);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.07);padding:.55rem 1.4rem;display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.brand{font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);flex-shrink:0}
.batch-tag{font-family:'JetBrains Mono',monospace;font-size:.65rem;font-weight:700;padding:.2rem .65rem;border-radius:12px;background:color-mix(in srgb,var(--col) 22%,transparent);color:var(--col);border:1px solid color-mix(in srgb,var(--col) 40%,transparent);flex-shrink:0}
.timer{font-family:'JetBrains Mono',monospace;font-size:.98rem;font-weight:700;min-width:3.5rem;text-align:center;padding:.16rem .5rem;border-radius:8px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:var(--cream)}
.timer.warn{color:var(--amber);animation:blink 1s infinite}
.timer.danger{color:var(--red-l);animation:blink .5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.prog-w{flex:1;min-width:80px;max-width:180px}
.prog-t{height:4px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden}
.prog-f{height:100%;background:var(--col);border-radius:3px;transition:width .3s}
.prog-l{font-family:'JetBrains Mono',monospace;font-size:.55rem;color:rgba(250,246,237,.3);margin-top:.2rem;text-align:right}
.sc{font-family:'JetBrains Mono',monospace;font-size:.65rem;padding:.18rem .55rem;border-radius:11px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.11);color:rgba(250,246,237,.6);flex-shrink:0}

/* MAIN */
main{max-width:580px;margin:0 auto;padding:1rem 1rem 3rem;position:relative;z-index:1}

/* SPLASH */
.splash{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 54px);gap:1.3rem;text-align:center;padding:1rem}
.splash h1{font-family:'Playfair Display',serif;font-size:clamp(2rem,6vw,3.2rem);font-weight:900;line-height:1.1}
.splash h1 span{color:var(--col)}
.splash p{font-size:.92rem;color:rgba(250,246,237,.52);max-width:34ch;line-height:1.65}
.info-pills{display:flex;flex-wrap:wrap;gap:.4rem;justify-content:center}
.ip{font-family:'JetBrains Mono',monospace;font-size:.68rem;padding:.22rem .65rem;border-radius:13px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.11);color:rgba(250,246,237,.52)}
.start-btn{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:.88rem;letter-spacing:.08em;padding:.72rem 2.2rem;border-radius:28px;background:var(--col);color:var(--navy);border:none;cursor:pointer;transition:.2s}
.start-btn:hover{filter:brightness(1.1);transform:translateY(-1px)}

/* QUESTION CARD */
.qcard{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:1.4rem 1.4rem 1.1rem;margin-bottom:1rem;animation:su .28s both}
@keyframes su{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.qmeta{display:flex;align-items:center;gap:.5rem;margin-bottom:.8rem}
.qnum{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:rgba(250,246,237,.28);letter-spacing:.1em}
.qt-badge{font-family:'JetBrains Mono',monospace;font-size:.58rem;padding:.16rem .5rem;border-radius:9px;background:rgba(255,255,255,.07);color:rgba(250,246,237,.4)}

/* Verb display */
.verb-inf{font-family:'Playfair Display',serif;font-size:2.8rem;font-weight:900;color:var(--cream);text-align:center;margin-bottom:.2rem}
.verb-tr{font-family:'Source Serif 4',serif;font-style:italic;font-size:.92rem;color:rgba(250,246,237,.35);text-align:center;margin-bottom:1.1rem}
.ask-label{font-family:'JetBrains Mono',monospace;font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--col);text-align:center;margin-bottom:.85rem}

/* TYPE-IN */
.type-row{display:flex;gap:.5rem;align-items:center}
.type-input{flex:1;font-family:'JetBrains Mono',monospace;font-size:1.05rem;font-weight:700;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.18);border-radius:10px;color:var(--cream);padding:.55rem .8rem;outline:none;transition:.18s;-webkit-appearance:none}
.type-input:focus{border-color:var(--col);background:rgba(255,255,255,.11)}
.type-input.ok{border-color:var(--green);background:rgba(46,204,113,.12);color:var(--green-l)}
.type-input.near{border-color:var(--amber);background:rgba(255,209,102,.1);color:var(--amber)}
.type-input.ko{border-color:var(--red);background:rgba(239,71,111,.13);color:var(--red-l)}
.val-btn{font-family:'JetBrains Mono',monospace;font-size:.8rem;font-weight:700;padding:.55rem 1.1rem;border-radius:10px;background:var(--col);color:var(--navy);border:none;cursor:pointer;transition:.18s;flex-shrink:0}
.val-btn:hover{filter:brightness(1.1)}
.val-btn:disabled{opacity:.35;pointer-events:none}

/* TRUE / FALSE */
.shown-form{
  font-family:'JetBrains Mono',monospace;font-size:2rem;font-weight:700;
  text-align:center;padding:.8rem 1rem;
  border-radius:14px;background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.12);
  color:var(--cream);margin-bottom:.9rem;
  transition:all .35s ease;
}
.shown-form.reveal-ok{background:rgba(46,204,113,.14);border-color:var(--green);color:var(--green-l)}
.shown-form.reveal-ko{background:rgba(239,71,111,.14);border-color:var(--red);color:var(--red-l);text-decoration:line-through}
.tf-btns{display:grid;grid-template-columns:1fr 1fr;gap:.6rem}
.tf-btn{
  font-family:'JetBrains Mono',monospace;font-size:.9rem;font-weight:700;
  padding:.65rem;border-radius:12px;border:1.5px solid rgba(255,255,255,.18);
  background:rgba(255,255,255,.05);color:var(--cream);cursor:pointer;transition:.2s;
}
.tf-btn:hover{background:rgba(255,255,255,.12)}
.tf-btn.disabled{pointer-events:none}
.tf-btn.selected-ok{background:rgba(46,204,113,.18);border-color:var(--green);color:var(--green-l)}
.tf-btn.selected-ko{background:rgba(239,71,111,.18);border-color:var(--red);color:var(--red-l)}
.tf-btn.hint-ok{background:rgba(46,204,113,.1);border-color:rgba(46,204,113,.4);color:var(--green-l)}

/* Correction input (shown after wrong TF answer) */
.correction-wrap{margin-top:.8rem;animation:su .25s both}
.corr-label{font-family:'JetBrains Mono',monospace;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(250,246,237,.4);margin-bottom:.4rem}
.corr-input{width:100%;font-family:'JetBrains Mono',monospace;font-size:1rem;font-weight:700;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.18);border-radius:10px;color:var(--cream);padding:.55rem .8rem;outline:none;transition:.18s;-webkit-appearance:none}
.corr-input:focus{border-color:var(--col)}
.corr-input.ok{border-color:var(--green);background:rgba(46,204,113,.12);color:var(--green-l)}
.corr-input.near{border-color:var(--amber);background:rgba(255,209,102,.1);color:var(--amber)}
.corr-input.ko{border-color:var(--red);background:rgba(239,71,111,.13);color:var(--red-l)}
.corr-submit{margin-top:.5rem;width:100%;font-family:'JetBrains Mono',monospace;font-size:.8rem;font-weight:700;padding:.55rem;border-radius:10px;background:var(--col);color:var(--navy);border:none;cursor:pointer;transition:.18s}
.corr-submit:hover{filter:brightness(1.1)}
.corr-submit:disabled{opacity:.35;pointer-events:none}

/* FEEDBACK */
.fb{margin-top:.85rem;padding:.7rem 1rem;border-radius:10px;font-size:.9rem;line-height:1.55;animation:su .22s both}
.fb.ok{background:rgba(46,204,113,.1);border:1px solid rgba(46,204,113,.24);color:var(--green-l)}
.fb.near{background:rgba(255,209,102,.1);border:1px solid rgba(255,209,102,.24);color:var(--amber)}
.fb.ko{background:rgba(239,71,111,.1);border:1px solid rgba(239,71,111,.24);color:var(--red-l)}
.fb .ans{color:var(--cream);font-weight:700}
.fb .note{margin-top:.35rem;font-size:.82rem;color:rgba(250,246,237,.5);font-style:italic}

.nxt{width:100%;margin-top:.8rem;font-family:'JetBrains Mono',monospace;font-size:.85rem;font-weight:700;letter-spacing:.06em;padding:.65rem;border-radius:12px;background:var(--col);color:var(--navy);border:none;cursor:pointer;transition:.18s;display:none}
.nxt.show{display:block}
.nxt:hover{filter:brightness(1.1)}

/* RESULTS */
.results{animation:su .4s both;padding:1rem 0 3rem;text-align:center}
.rpct{font-family:'Playfair Display',serif;font-size:4rem;font-weight:900;color:var(--col);line-height:1}
.rlabel{font-size:.88rem;color:rgba(250,246,237,.42);margin-top:.22rem}
.rgrade{font-family:'JetBrains Mono',monospace;font-size:1rem;font-weight:700;margin-top:.5rem;margin-bottom:1.2rem}
.rcard{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:1rem 1.2rem;margin:0 auto 1.1rem;max-width:400px;text-align:left}
.rrow{display:flex;justify-content:space-between;padding:.35rem 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:.88rem}
.rrow:last-child{border-bottom:none}
.rrow span:first-child{color:rgba(250,246,237,.5)}
.rrow span:last-child{font-family:'JetBrains Mono',monospace;font-weight:700}
.rbar-w{height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;margin:.4rem 0}
.rbar{height:100%;background:var(--col);border-radius:3px;transition:width 1.2s cubic-bezier(.2,1,.3,1)}
.rbtn{font-family:'JetBrains Mono',monospace;font-size:.82rem;font-weight:700;letter-spacing:.06em;padding:.62rem 1.6rem;border-radius:26px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.16);color:var(--cream);cursor:pointer;transition:.2s;margin:.35rem}
.rbtn:hover{background:rgba(255,255,255,.13)}
.rbtn.prim{background:var(--col);border-color:var(--col);color:var(--navy)}
.rbtn.prim:hover{filter:brightness(1.1)}
.timeout-b{text-align:center;padding:1.1rem 1rem;font-family:'JetBrains Mono',monospace;font-size:.85rem;color:var(--red-l);letter-spacing:.06em;margin-bottom:.8rem;background:rgba(239,71,111,.1);border:1px solid rgba(239,71,111,.24);border-radius:12px}
</style>
</head>
<body>
<div class="orb o1"></div>
<div class="orb o2"></div>
<div class="hdr" id="hdr" style="display:none">
  <div class="brand">Marc Vasseur · Polytech Lille</div>
  <div class="batch-tag">Batch 2 · Verbes courants</div>
  <div class="timer" id="tmr">5:00</div>
  <div class="prog-w">
    <div class="prog-t"><div class="prog-f" id="pf" style="width:0%"></div></div>
    <div class="prog-l" id="pl">0 / 25</div>
  </div>
  <div class="sc" id="slive">0 pts</div>
</div>
<main id="main"></main>
<script>
const QS=[{qt:'tf',ask:'pret',shown:'leted',correct:false,v:[21,'let','let','let','laisser / permettre']},{qt:'type',ask:'pret',v:[23,'show','showed','shown','montrer']},{qt:'tf',ask:'pret',shown:'losed',correct:false,v:[31,'lose','lost','lost','perdre']},{qt:'type',ask:'pp',v:[30,'stand','stood','stood','se tenir debout']},{qt:'tf',ask:'pret',shown:'broke',correct:true,v:[37,'break','broke','broken','casser']},{qt:'tf',ask:'pret',shown:'sited',correct:false,v:[29,'sit','sat','sat','s\'asseoir']},{qt:'type',ask:'pret',v:[21,'let','let','let','laisser / permettre']},{qt:'type',ask:'pret',v:[29,'sit','sat','sat','s\'asseoir']},{qt:'type',ask:'pp',v:[36,'drive','drove','driven','conduire']},{qt:'type',ask:'pret',v:[35,'run','ran','run','courir']},{qt:'type',ask:'pret',v:[33,'read','read','read','lire']},{qt:'tf',ask:'pret',shown:'built',correct:true,v:[40,'build','built','built','construire']},{qt:'tf',ask:'pret',shown:'stood',correct:true,v:[30,'stand','stood','stood','se tenir debout']},{qt:'type',ask:'pp',v:[40,'build','built','built','construire']},{qt:'tf',ask:'pret',shown:'brought',correct:true,v:[24,'bring','brought','brought','apporter']},{qt:'type',ask:'pret',v:[31,'lose','lost','lost','perdre']},{qt:'tf',ask:'pret',shown:'met',correct:true,v:[26,'meet','met','met','rencontrer']},{qt:'tf',ask:'pret',shown:'paid',correct:true,v:[32,'pay','paid','paid','payer']},{qt:'tf',ask:'pret',shown:'grew',correct:true,v:[34,'grow','grew','grown','grandir / pousser']},{qt:'tf',ask:'pp',shown:'showed',correct:false,v:[23,'show','showed','shown','montrer']},{qt:'type',ask:'pp',v:[34,'grow','grew','grown','grandir / pousser']},{qt:'type',ask:'pret',v:[25,'write','wrote','written','écrire']},{qt:'type',ask:'pp',v:[22,'begin','began','begun','commencer']},{qt:'tf',ask:'pret',shown:'drived',correct:false,v:[36,'drive','drove','driven','conduire']},{qt:'type',ask:'pp',v:[26,'meet','met','met','rencontrer']}];
const TOTAL=QS.length, TIMER=300;
let cur=0,pts=0,maxPts=0,secs=TIMER,tInt=null,timedOut=false;

function norm(s){
  return s.toLowerCase()
    .trim()
    .replace(/[/\\*,.;:!?()\[\]{}"'\-]/g,' ')  // strip punctuation incl. slashes
    .replace(/\s+/g,' ')
    .trim();
}
function parseSlash(s){return s.split('/').map(p=>p.trim().toLowerCase());}
function lev(a,b){
  const dp=Array.from({length:a.length+1},(_,i)=>[i,...Array(b.length).fill(0)]);
  for(let j=1;j<=b.length;j++)dp[0][j]=j;
  for(let i=1;i<=a.length;i++)for(let j=1;j<=b.length;j++)
    dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[a.length][b.length];
}
function chk(userRaw,correctRaw){
  const u=norm(userRaw);
  // Accept if user matches ANY individual form (e.g. just "was" for "was / were")
  const opts=parseSlash(correctRaw);
  if(opts.some(o=>norm(o)===u))return'ok';
  // Accept if user typed all forms together (e.g. "was were" for "was / were")
  const fullNorm=norm(correctRaw);
  if(fullNorm===u)return'ok';
  // Near-miss on any option
  if(opts.some(o=>lev(norm(o),u)<=2))return'near';
  if(lev(fullNorm,u)<=2)return'near';
  return'ko';
}

/* TIMER */
function updateTimer(){
  const m=Math.floor(secs/60),s=secs%60;
  const el=document.getElementById('tmr');
  el.textContent=m+':'+(s<10?'0':'')+s;
  el.className='timer'+(secs<=60?' danger':secs<=120?' warn':'');
}
function startTimer(){
  updateTimer();
  tInt=setInterval(()=>{secs--;updateTimer();if(secs<=0){clearInterval(tInt);timedOut=true;showResults();}},1000);
}

/* SPLASH */
document.getElementById('main').innerHTML=`
<div class="splash">
  <h1>Batch 2<br><span>Verbes courants</span></h1>
  <p>25 questions · 5 minutes<br>Saisie libre + Vrai / Faux à corriger</p>
  <div class="info-pills">
    <span class="ip">⏱ 5 min</span>
    <span class="ip">25 questions</span>
    <span class="ip">Ordre aléatoire</span>
    <span class="ip">Verbes n°21–40</span>
  </div>
  <button class="start-btn" onclick="startQuiz()">▶ Démarrer</button>
  <div style="font-family:'JetBrains Mono',monospace;font-size:.56rem;color:rgba(250,246,237,.18);letter-spacing:.1em;text-transform:uppercase">Polytech Lille · PEIP2 · Anglais</div>
</div>`;

function startQuiz(){
  maxPts=QS.reduce((s,q)=>s+1+(q.qt==='tf'&&!q.correct?1:0),0);
  document.getElementById('hdr').style.display='flex';
  startTimer();
  render();
}

function updateHdr(){
  const pct=cur/TOTAL*100;
  document.getElementById('pf').style.width=pct+'%';
  document.getElementById('pl').textContent=(cur+1)+' / '+TOTAL;
  document.getElementById('slive').textContent=pts+' / '+maxPts+' pts';
}

/* ── RENDER ── */
function render(){
  if(cur>=TOTAL){clearInterval(tInt);showResults();return;}
  const q=QS[cur];
  const v=q.v;
  updateHdr();

  const askStr=q.ask==='pret'
    ?'<span style="color:var(--col)">Prétérit</span>'
    :'<span style="color:var(--col)">Participe passé</span>';
  const badgeStr=q.qt==='type'?'Saisie libre':'Vrai / Faux';

  let bodyHtml='';
  if(q.qt==='type'){
    const correct=q.ask==='pret'?v[2]:v[3];
    bodyHtml=`
    <div class="ask-label">Donne le ${q.ask==='pret'?'prétérit':'participe passé'} de <strong>${v[1]}</strong></div>
    <div class="type-row">
      <input class="type-input" id="ti" type="text" placeholder="…"
        autocorrect="off" autocapitalize="off" spellcheck="false"
        onkeydown="if(event.key==='Enter')submitType()">
      <button class="val-btn" id="vb" onclick="submitType()">OK ↵</button>
    </div>`;
  } else {
    const fieldStr=q.ask==='pret'?'prétérit':'participe passé';
    bodyHtml=`
    <div class="ask-label">${fieldStr} de <strong>${v[1]}</strong> :</div>
    <div class="shown-form" id="sf">${q.shown}</div>
    <div class="tf-btns">
      <button class="tf-btn" id="tf-v" onclick="submitTF(true)">✓ Correct</button>
      <button class="tf-btn" id="tf-f" onclick="submitTF(false)">✗ Faux</button>
    </div>
    <div id="corr-zone"></div>`;
  }

  document.getElementById('main').innerHTML=`
  <div class="qcard">
    <div class="qmeta">
      <span class="qnum">Q${cur+1} / ${TOTAL}</span>
      <span class="qt-badge">${badgeStr}</span>
    </div>
    <div class="verb-inf">${v[1]}</div>
    <div class="verb-tr">${v[4]}</div>
    ${bodyHtml}
    <div id="fb"></div>
    <button class="nxt" id="nxt" onclick="nextQ()">${cur+1<TOTAL?'Verbe suivant →':'Voir les résultats →'}</button>
  </div>`;

  if(q.qt==='type') setTimeout(()=>{const e=document.getElementById('ti');if(e)e.focus();},100);
}

/* ── TYPE-IN SUBMIT ── */
function submitType(){
  const vbtn=document.getElementById('vb');
  if(!vbtn||vbtn.disabled)return;
  vbtn.disabled=true;
  const inp=document.getElementById('ti');
  inp.disabled=true;
  const q=QS[cur];
  const correct=q.ask==='pret'?q.v[2]:q.v[3];
  const res=chk(inp.value, correct);
  inp.className='type-input '+res;
  if(res==='ok'){pts++;showFB('ok',`✓ <span class="ans">${correct}</span>`)}
  else if(res==='near'){pts++;showFB('near',`~ <span class="ans">${correct}</span> — attention à l'orthographe`)}
  else{showFB('ko',`✗ La bonne réponse : <span class="ans">${correct}</span>`)}
  document.getElementById('slive').textContent=pts+' / '+maxPts+' pts';
  document.getElementById('nxt').classList.add('show');
}

/* ── TF SUBMIT ── */
function submitTF(userSaysTrue){
  const q=QS[cur];
  document.getElementById('tf-v').classList.add('disabled');
  document.getElementById('tf-f').classList.add('disabled');
  const sf=document.getElementById('sf');
  const correct=q.ask==='pret'?q.v[2]:q.v[3];
  const isActuallyCorrect=q.correct;

  const userRight=(userSaysTrue===isActuallyCorrect);

  if(userSaysTrue){document.getElementById('tf-v').classList.add(userRight?'selected-ok':'selected-ko');}
  else{document.getElementById('tf-f').classList.add(userRight?'selected-ok':'selected-ko');}

  if(isActuallyCorrect){sf.classList.add('reveal-ok');}
  else{sf.classList.add('reveal-ko');}

  if(userRight){
    // User correctly identified it — now must type the correct form if it was wrong
    pts++;
    if(!isActuallyCorrect){
      // They said "faux" correctly — must now TYPE the right answer (+1 bonus pt)
      showCorrectionInput(correct);
    } else {
      showFB('ok','✓ Correct !');
      document.getElementById('nxt').classList.add('show');
    }
  } else {
    // User was wrong
    if(isActuallyCorrect){
      // It WAS correct but they said faux
      showFB('ko',`✗ C'était correct : <span class="ans">${correct}</span>`);
    } else {
      // It WAS wrong but they said vrai
      // Reveal the correct answer + show correction input
      showFB('ko',`✗ Faux — la bonne réponse : <span class="ans">${correct}</span>`);
    }
    document.getElementById('slive').textContent=pts+' / '+maxPts+' pts';
    document.getElementById('nxt').classList.add('show');
  }
}

function showCorrectionInput(correct){
  const zone=document.getElementById('corr-zone');
  zone.innerHTML='<div class="correction-wrap">'
    +'<div class="corr-label">Bien repéré ! Maintenant écris la bonne forme :</div>'
    +'<input class="corr-input" id="ci" type="text" placeholder="…" '
    +'data-correct="'+correct.replace(/"/g,'&quot;')+'" '
    +'autocorrect="off" autocapitalize="off" spellcheck="false" autofocus '
    +'onkeydown="if(event.key===\'Enter\')submitCorrFromInput()">'
    +'<button class="corr-submit" id="cs" onclick="submitCorrFromInput()">Valider ↵</button>'
    +'</div>';
  setTimeout(()=>{const e=document.getElementById('ci');if(e)e.focus();},120);
}

function submitCorrFromInput(){
  const inp=document.getElementById('ci');
  if(!inp)return;
  const correct=inp.getAttribute('data-correct')||'';
  submitCorr(correct);
}

function submitCorr(correct){
  const csBtn=document.getElementById('cs');
  if(!csBtn||csBtn.disabled)return;
  csBtn.disabled=true;
  const inp=document.getElementById('ci');
  inp.disabled=true;
  const res=chk(inp.value, correct);
  inp.className='corr-input '+res;
  if(res==='ok'){pts++;showFB('ok',`✓ Parfait : <span class="ans">${correct}</span> (+1 pt bonus)`)}
  else if(res==='near'){pts++;showFB('near',`~ Presque : <span class="ans">${correct}</span> — orthographe (+1 pt)`)}
  else{showFB('ko',`✗ La bonne forme : <span class="ans">${correct}</span>`)}
  document.getElementById('slive').textContent=pts+' / '+maxPts+' pts';
  document.getElementById('nxt').classList.add('show');
}

function showFB(cls, msg){
  const same=(cls==='ok'||cls==='near') && QS[cur].v[2]===QS[cur].v[3];
  const note=same?'<div class="note">💡 Ce verbe a la même forme au prétérit et au participe passé.</div>':'';
  document.getElementById('fb').innerHTML=`<div class="fb ${cls}">${msg}${note}</div>`;
}

function nextQ(){cur++;render();}

/* ── RESULTS ── */
function showResults(){
  clearInterval(tInt);
  document.getElementById('hdr').style.display='none';
  const pct=Math.round(pts/maxPts*100);
  const grade=pct>=90?'🏆 Excellent':pct>=75?'✅ Bien':pct>=55?'📚 Assez bien':pct>=40?'⚠ À revoir':'📖 À reprendre';
  document.getElementById('main').innerHTML=`
  <div class="results">
    ${timedOut?'<div class="timeout-b">⏱ Temps écoulé !</div>':''}
    <div class="rpct">${pct}%</div>
    <div class="rlabel">${pts} / ${maxPts} points · Batch 2 — Verbes courants</div>
    <div class="rgrade">${grade}</div>
    <div class="rcard">
      <div class="rrow"><span>Questions</span><span>${TOTAL}</span></div>
      <div class="rrow"><span>Points</span><span style="color:var(--col)">${pts} / ${maxPts}</span></div>
      <div class="rrow"><span>Score</span><span>${pct}%</span></div>
      <div class="rbar-w"><div class="rbar" id="rb" style="width:0%"></div></div>
    </div>
    <button class="rbtn prim" onclick="location.reload()">↺ Recommencer (ordre différent)</button>
  </div>`;
  setTimeout(()=>{const b=document.getElementById('rb');if(b)b.style.width=pct+'%';},200);
}
</script>
</body>
